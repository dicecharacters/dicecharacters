<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Charakterbogen</title>
    <link rel="stylesheet" href="css/sheet_style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.js"></script>

    <script src="translations/translationsCore.js"></script>
    <script src="translations/translationsBarbarian.js"></script>
    <script src="translations/translationsBard.js"></script>
    <script src="translations/translationsCleric.js"></script>
    <script src="translations/translationsDruid.js"></script>
    <script src="translations/translationsFighter.js"></script>
    <script src="translations/translationsMonk.js"></script>
    <script src="translations/translationsPaladin.js"></script>
    <script src="translations/translationsRanger.js"></script>
    <script src="translations/translationsRogue.js"></script>
    <script src="translations/translationsSorcerer.js"></script>
    <script src="translations/translationsWarlock.js"></script>
    <script src="translations/translationsWizard.js"></script>

    <script src="translations/translationsSpecies.js"></script>
    <script src="translations/translationsBackgrounds.js"></script>
    <script src="translations/translationsFeats.js"></script>
    <script src="translations/translationsWeaponAndArmor.js"></script>
    <script src="translations/translationsToolsAndItems.js"></script>
    <script src="translations/translationsSpells.js"></script>
    <script src="translations/translationsSpellDesciptions.js"></script>
    <script src="translations/translationsReligion.js"></script>

    <script src="data/coreData.js"></script>
    <script src="data/backgroundData.js"></script>
    <script src="data/speciesData.js"></script>
    <script src="data/weaponAndArmorData.js"></script>
    <script src="data/toolsData.js"></script>
    <script src="data/gearData.js"></script>
    <script src="data/featData.js"></script>
    <script src="data/spellData.js"></script>
    <script src="data/religionData.js"></script>

    <script src="data/barbarianClassData.js"></script>
    <script src="data/bardClassData.js"></script>
    <script src="data/clericClassData.js"></script>
    <script src="data/druidClassData.js"></script>
    <script src="data/fighterClassData.js"></script>
    <script src="data/monkClassData.js"></script>
    <script src="data/paladinClassData.js"></script>
    <script src="data/rangerClassData.js"></script>
    <script src="data/rogueClassData.js"></script>
    <script src="data/sorcererClassData.js"></script>
    <script src="data/warlockClassData.js"></script>
    <script src="data/wizardClassData.js"></script>
    <script src="data/imageData.js"></script>
    <script src="featureHandlers.js"></script>
</head>
<body>
<div class="control-group">
    <div id="appendixToggleWrapper" style="display: none; align-items: center; justify-content: flex-end; gap: 8px; margin-bottom: 5px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 12px;">
        <label for="generateSpellDesc" id="generateSpellDescLabel" style="color: white; font-size: 1.2rem; cursor: pointer;"></label>
        <input type="checkbox" id="generateSpellDesc" class="rounded-checkbox" style="width: 1.5rem; height: 1.5rem; cursor: pointer;" onchange="toggleAppendix()">
    </div>

    <button id="editModeBtn" class="control-btn edit-btn" onclick="toggleEditMode()">
        Bearbeiten
    </button>
    
    <button id="downloadBtn" class="control-btn download-btn" onclick="downloadPDF()">
        Als PDF herunterladen
    </button>
</div>
<div id="sheetRoot">
    <div class="page">
        <div class="character-sheet">

            <header class="sheet-header">
                <div class="char-name-group">
                    <input type="text" id="characterName" name="characterName" class="character-name-input" placeholder="Dein Charaktername">
                    <label for="characterName" class="character-name-label" id="characterNameLabel"></label>
                </div>
                <div class="level-xp">
                    <div class="field-group">
                        <input type="text" id="level" name="level" placeholder="Stufe" readonly>
                        <label id="levelLabel" for="level">Stufe</label>
                    </div>
                    <div class="field-group">
                        <input type="text" id="xp" name="xp" placeholder="XP" readonly>
                        <label id="xpLabel" for="xp">XP</label>
                    </div>
                </div>
                <div class="header">
                    <div class="field-group">
                        <label id="classLabel" for="class">Klasse</label>
                        <input type="text" id="class" name="class" placeholder="Klasse" readonly>
                    </div>
                    <div class="field-group">
                        <label id="backgroundLabel" for="background">Hintergrund</label>
                        <input type="text" id="background" name="background" placeholder="Hintergrund" readonly>
                    </div>
                    <div class="field-group">
                        <label id="subclassLabel" for="subclass">Unterklasse</label>
                        <input type="text" id="subclass" name="subclass" placeholder="Unterklasse" readonly>
                    </div>
                    <div class="field-group">
                        <label id="speciesLabel" for="species">Volk</label>
                        <input type="text" id="species" name="species" placeholder="Volk" readonly>
                    </div>
                </div>
            </header>

            <div class="sheet-divider">
                <div class="line"></div>
                <img id="dragonDivider" src="" alt="Drachen-Trenner">
                <div class="line"></div>
            </div>

            <section class="sheet-info-blocks">
                <div class="block">
                    <div class="block-header" id="heroicInspirationLabel"></div>
                    <div class="block-divider"></div>
                    <input type="text" id="heroicInspiration" readonly>
                </div>
                <div class="block">
                    <div class="block-header" id="passivePerceptionLabel"></div>
                    <div class="block-divider"></div>
                    <input type="text" id="passivePerception" readonly>
                </div>
                <div class="block">
                    <div class="block-header" id="initiativeLabel"></div>
                    <div class="block-divider"></div>
                    <input type="text" id="initiative" readonly>
                </div>
                <div class="block">
                    <div class="block-header" id="speedLabel"></div>
                    <div class="block-divider"></div>
                    <input type="text" id="speed" readonly>
                </div>
                <div class="block">
                    <div class="block-header" id="sizeCategoryLabel"></div>
                    <div class="block-divider"></div>
                    <input type="text" id="sizeCategory" readonly>
                </div>
            </section>

            <main class="sheet-main-content">
                <div class="attributes-column" id="attributes-col-1">
                    <div class="attribute-box" id="strength">
                        <div class="attribute-header" id="strengthLabel"></div>
                        <div class="attribute-body">
                            <div class="attribute-score">
                                <div class="modifier-container">
                                    <div class="modifier-circle"><input type="text" id="strengthModifier" readonly></div>
                                    <div class="modifier-label" id="modifierLabel"></div>
                                </div>
                                <div class="score-container">
                                    <div class="score-box"><input type="text" id="strengthScore"></div>
                                    <div class="score-label" id="scoreLabel"></div>
                                </div>
                            </div>
                            <div class="saving-throw">
                                <input type="checkbox" id="strengthSavingTrained" class="rounded-checkbox">
                                <input type="text" id="strengthSavingValue" readonly>
                                <label for="strengthSavingTrained" id="strengthSavingLabel"></label>
                            </div>
                            <div class="skills" id="strengthSkills"></div>
                        </div>
                    </div>
                    <div class="attribute-box" id="dexterity">
                         <div class="attribute-header" id="dexterityLabel"></div>
                         <div class="attribute-body">
                            <div class="attribute-score">
                                <div class="modifier-container">
                                    <div class="modifier-circle"><input type="text" id="dexterityModifier" readonly></div>
                                    <div class="modifier-label"></div>
                                </div>
                                <div class="score-container">
                                    <div class="score-box"><input type="text" id="dexterityScore"></div>
                                    <div class="score-label"></div>
                                </div>
                            </div>
                            <div class="saving-throw">
                                <input type="checkbox" id="dexteritySavingTrained" class="rounded-checkbox">
                                <input type="text" id="dexteritySavingValue" readonly>
                                <label for="dexteritySavingTrained" id="dexteritySavingLabel"></label>
                            </div>
                            <div class="skills" id="dexteritySkills"></div>
                        </div>
                    </div>
                    <div class="attribute-box" id="wisdom">
                        <div class="attribute-header" id="wisdomLabel"></div>
                        <div class="attribute-body">
                            <div class="attribute-score">
                                <div class="modifier-container">
                                    <div class="modifier-circle"><input type="text" id="wisdomModifier" readonly></div>
                                    <div class="modifier-label"></div>
                                </div>
                                <div class="score-container">
                                    <div class="score-box"><input type="text" id="wisdomScore"></div>
                                    <div class="score-label"></div>
                                </div>
                            </div>
                            <div class="saving-throw">
                                <input type="checkbox" id="wisdomSavingTrained" class="rounded-checkbox">
                                <input type="text" id="wisdomSavingValue" readonly>
                                <label for="wisdomSavingTrained" id="wisdomSavingLabel"></label>
                            </div>
                            <div class="skills" id="wisdomSkills"></div>
                        </div>
                    </div>
                </div>

                <div class="attributes-column" id="attributes-col-2">
                    <div class="attribute-box" id="constitution">
                        <div class="attribute-header" id="constitutionLabel"></div>
                        <div class="attribute-body">
                            <div class="attribute-score">
                                <div class="modifier-container">
                                    <div class="modifier-circle"><input type="text" id="constitutionModifier" readonly></div>
                                    <div class="modifier-label"></div>
                                </div>
                                <div class="score-container">
                                    <div class="score-box"><input type="text" id="constitutionScore"></div>
                                    <div class="score-label"></div>
                                </div>
                            </div>
                            <div class="saving-throw">
                                <input type="checkbox" id="constitutionSavingTrained" class="rounded-checkbox">
                                <input type="text" id="constitutionSavingValue" readonly>
                                <label for="constitutionSavingTrained" id="constitutionSavingLabel"></label>
                            </div>
                            <div class="skills" id="constitutionSkills"></div>
                        </div>
                    </div>
                    <div class="attribute-box" id="intelligence">
                        <div class="attribute-header" id="intelligenceLabel"></div>
                        <div class="attribute-body">
                            <div class="attribute-score">
                                <div class="modifier-container">
                                    <div class="modifier-circle"><input type="text" id="intelligenceModifier" readonly></div>
                                    <div class="modifier-label"></div>
                                </div>
                                <div class="score-container">
                                    <div class="score-box"><input type="text" id="intelligenceScore"></div>
                                    <div class="score-label"></div>
                                </div>
                            </div>
                            <div class="saving-throw">
                                <input type="checkbox" id="intelligenceSavingTrained" class="rounded-checkbox">
                                <input type="text" id="intelligenceSavingValue" readonly>
                                <label for="intelligenceSavingTrained" id="intelligenceSavingLabel"></label>
                            </div>
                            <div class="skills" id="intelligenceSkills"></div>
                        </div>
                    </div>
                    <div class="attribute-box" id="charisma">
                         <div class="attribute-header" id="charismaLabel"></div>
                         <div class="attribute-body">
                            <div class="attribute-score">
                                <div class="modifier-container">
                                    <div class="modifier-circle"><input type="text" id="charismaModifier" readonly></div>
                                    <div class="modifier-label"></div>
                                </div>
                                <div class="score-container">
                                    <div class="score-box"><input type="text" id="charismaScore"></div>
                                    <div class="score-label"></div>
                                </div>
                            </div>
                            <div class="saving-throw">
                                <input type="checkbox" id="charismaSavingTrained" class="rounded-checkbox">
                                <input type="text" id="charismaSavingValue" readonly>
                                <label for="charismaSavingTrained" id="charismaSavingLabel"></label>
                            </div>
                            <div class="skills" id="charismaSkills"></div>
                        </div>
                    </div>
                </div>

                <div class="right-column">
                    <div class="stats-group">
                        <div class="left-stats-column">
                            <div class="proficiency-bonus-container">
                                <div class="bonus-circle"><input type="text" id="proficiencyBonus" readonly></div>
                                <div class="bonus-label"><span id="proficiencyBonusLabel"></span></div>
                            </div>
                            <div class="icon-details-wrapper">
                                <div class="stat-container">
                                    <img id="shieldIcon" src="" alt="Rüstungsklasse" class="stat-background-image">
                                    <input type="text" class="stat-value-input" id="armorClass" readonly>
                                    <div class="stat-banner"><span class="banner-label" id="armorClassLabel"></span></div>
                                </div>
                                <div class="image-details-box armor-details-box">
                                    <div class="details-field">
                                        <input type="text" id="equippedArmor">
                                        <label for="equippedArmor" id="equipedArmorLabel"></label>
                                    </div>
                                    <div class="details-field checkbox-field">
                                        <input type="checkbox" id="shieldActive" class="rounded-checkbox">
                                        <label for="shieldActive" id="shieldActiveLabel"></label>
                                    </div>
                                </div>
                            </div>
                            <div class="icon-details-wrapper">
                                <div class="stat-container">
                                    <img id="heartIcon" src="" alt="Trefferpunkte" class="stat-background-image">
                                    <input type="text" class="stat-value-input" id="currentHP" readonly>
                                    <span class="sub-stat-label" id="currentHPLabel"></span>
                                    <div class="stat-banner"><span class="banner-label" id="hitPointsLabel"></span></div>
                                </div>
                                <div class="image-details-box hp-details-box">
                                    <div class="details-field">
                                        <input type="text" id="tempHP">
                                        <label for="tempHP" id="tempHPLabel"></label>
                                    </div>
                                    <div class="details-field">
                                        <input type="text" id="maxHP">
                                        <label for="maxHP" id="maxHPLabel"></label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="right-stats-column">
                            <div class="stat-info-box death-saves-box">
                                <div class="box-header" id="deathSavesLabel"></div>
                                <div class="box-divider"></div>
                                <div class="saves-rows-container">
                                    <div class="saves-row">
                                        <label id="successDSLabel"></label>
                                        <div class="checkbox-group">
                                            <input type="checkbox" class="rounded-checkbox">
                                            <input type="checkbox" class="rounded-checkbox">
                                            <input type="checkbox" class="rounded-checkbox">
                                        </div>
                                    </div>
                                    <div class="saves-row">
                                        <label id="failDSLabel"></label>
                                        <div class="checkbox-group">
                                            <input type="checkbox" class="rounded-checkbox">
                                            <input type="checkbox" class="rounded-checkbox">
                                            <input type="checkbox" class="rounded-checkbox">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="stat-info-box hit-dice-box">
                                <div class="box-header" id="hitDiceLabel"></div>
                                <div class="box-divider"></div>
                                <div class="dice-fields-container">
                                    <div class="hit-dice-field">
                                        <input type="text" id="spentHD">
                                        <label for="spentHD" id="spentHDLabel"></label>
                                    </div>
                                    <div class="hit-dice-field">
                                        <input type="text" id="maxHD">
                                        <label for="maxHD" id="maxHDLabel"></label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="trainings-container">
                        <div class="trainings-box">
                            <div class="box-header" id="weaponTrainingLabel"></div>
                            <div class="box-divider"></div>
                            <div class="trainings-section">
                                <h4 class="trainings-subheader" id="weaponCategoriesLabel"></h4>
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" id="simpleMeleeWeapons" class="rounded-checkbox"><label for="simpleMeleeWeapons" id="simpleMeleeWeaponsLabel"></label></div>
                                    <div class="checkbox-item"><input type="checkbox" id="simpleRangedWeapons" class="rounded-checkbox"><label for="simpleRangedWeapons" id="simpleRangedWeaponsLabel"></label></div>
                                    <div class="checkbox-item"><input type="checkbox" id="martialMeleeWeapons" class="rounded-checkbox"><label for="martialMeleeWeapons" id="martialMeleeWeaponsLabel"></label></div>
                                    <div class="checkbox-item"><input type="checkbox" id="martialRangedWeapons" class="rounded-checkbox"><label for="martialRangedWeapons" id="martialRangedWeaponsLabel"></label></div>
                                </div>
                            </div>
                            <hr class="section-divider">
                            <div class="trainings-section">
                                <h4 class="trainings-subheader" id="weaponPropertiesLabel"></h4>
                                <textarea id="weaponProperties" rows="2" placeholder="z.B. Finesse, Reichweite, ..."></textarea>
                            </div>
                            <hr class="section-divider">
                            <div class="trainings-section">
                                <h4 class="trainings-subheader" id="weaponMasteriesLabel"></h4>
                                <textarea id="weaponMasteries" rows="2" placeholder="z.B. Stoßen, Ansturm, ..."></textarea>
                            </div>
                        </div>
                        <div class="trainings-box">
                            <div class="box-header" id="armorTrainingLabel"></div>
                            <div class="box-divider"></div>
                            <div class="trainings-section">
                                <div class="checkbox-grid">
                                    <div class="checkbox-item"><input type="checkbox" id="lightArmor" class="rounded-checkbox"><label for="lightArmor" id="lightArmorLabel"></label></div>
                                    <div class="checkbox-item"><input type="checkbox" id="mediumArmor" class="rounded-checkbox"><label for="mediumArmor" id="mediumArmorLabel"></label></div>
                                    <div class="checkbox-item"><input type="checkbox" id="heavyArmor" class="rounded-checkbox"><label for="heavyArmor" id="heavyArmorLabel"></label></div>
                                    <div class="checkbox-item"><input type="checkbox" id="shieldProf" class="rounded-checkbox"><label for="shieldProf" id="shieldLabel"></label></div>
                                </div>
                            </div>
                        </div>
                        <div class="trainings-box">
                            <div class="box-header" id="masteredToolsLabel"></div>
                            <div class="box-divider"></div>
                            <div class="trainings-section">
                                <textarea id="masteredTools" rows="2" placeholder="z.B. Schmiedewerkzeug, Diebeswerkzeug..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="sheet-footer">
                <div class="footer-left">
                    <label for="playerName" id="playerNameLabel"></label>
                    <input type="text" id="playerName" name="playerName">
                </div>
                <div class="footer-right">
			<span id="pageNumberLabel"></span>
			<span id="pageNumber">1 / <span class="total-pages-display"></span></span>
                </div>
            </footer>

        </div>
    </div>

 <div class="page">
    <div class="character-sheet simple-layout">

        <header class="simple-header">
            <div class="header-left-simple">
                <input type="text" class="simple-input-name sync-char-name" readonly>
            </div>
            <div class="header-right-simple">
                <h1 class="page-title" id="page2Title">Ausrüstung</h1>
            </div>
        </header>

        <div class="simple-divider-line"></div>

          <main class="sheet-main-content simple-content-override">
                
                <div class="stat-info-box full-width-box">
                    <div class="box-header" id="physicalAttacksLabel"></div>
                    <div class="box-divider"></div>
                    
                      <table class="attack-table">
                        <thead>
                            <tr>
                                <th id="th_weapon_attack" style="width: 18%;" class="align-left"></th>
                                
                                <th id="th_bonus" style="width: 6%;" class="align-center"></th>
                                
                                <th id="th_damage_type" style="width: 12%;" class="align-center"></th>
                                
                                <th id="th_properties" style="width: 19%;" class="align-left"></th>
                                
                                <th id="th_mastery" style="width: 12%;" class="align-center"></th>
                                
                                <th id="th_description" style="width: 33%;" class="align-left"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                            </tr>
                            <tr>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                            </tr>
                            <tr>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                            </tr>
                            <tr>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                            </tr>
                            <tr>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                            </tr>
                            <tr>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                                <td><input type="text" class="table-input align-center"></td>
                                <td><input type="text" class="table-input align-left"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="labeled-divider">
                    <div class="line"></div>
                    <div class="divider-text" id="luggageLabel"></div>
                    <div class="line"></div>
                </div>

                <div class="inventory-grid">
                    
                    <div class="inventory-col">
                        
                        <div class="stat-info-box inventory-box">
                            <div class="box-header" id="weaponsLabel"></div>
                            <div class="box-divider"></div>
                            <table class="attack-table inventory-table">
                                <thead>
                                    <tr>
                                        <th id="th_amount_1" style="width: 15%;" class="align-center"></th>
                                        <th id="th_item_1" style="width: 65%;" class="align-left"></th>
                                        <th id="th_equipped_1" style="width: 20%;" class="align-center"></th>
                                    </tr>
                                </thead>
                                <tbody>

<script>

/* ==========================================================================
   GLOBAL SETTINGS
   ========================================================================== */
// Hier stellen wir die Sprache ein. Alle Funktionen greifen darauf zu.
let currentLanguage = 'de';
let totalPages = 6; // Hier änderst du die Zahl zentral
window.spellAppendixPages = {};

/* ==========================================================================
   AREAL 1: INITIALISIERUNG (CONTROLLER)
   ========================================================================== */
window.onload = function() {
    console.log('Initialisierung gestartet...');

    /* ==========================================================
       SPRACHE AUS LOCAL STORAGE AUSLESEN
       ========================================================== */
    const savedLang = localStorage.getItem("currentLanguage");
    // Wir prüfen, ob eine Sprache übergeben wurde UND ob wir dafür Übersetzungen haben
    if (savedLang && translations[savedLang]) {
        currentLanguage = savedLang;
        console.log("Sprache aus Ersteller geladen:", currentLanguage);
    } else {
        currentLanguage = 'de'; // Fallback / Default
        console.log("Keine (gültige) Sprache übergeben. Standard 'de' wird genutzt.");
    }
    /* ========================================================== */

    // 1. Statische Bilder laden
    document.getElementById('dragonDivider').src = dragonDividerImageBase64;
    document.getElementById('shieldIcon').src = shieldImageBase64;
    document.getElementById('heartIcon').src = heartImageBase64;

    // 2. Übersetzungen initial anwenden (Areal 6)
    applyTranslations();

    // 3. Daten aus Local Storage holen (Areal 2)
    const charData = loadCharacterDataFromStorage();

    /* ==========================================================
       NEU: PRÜFUNG OB ZAUBER (Seite 5) ERFORDERLICH
       ========================================================== */
    // 1. ZAUBER-SEITE PRÜFEN (Seite 5)
    const hasCantrips = (charData.spells.cantrips && charData.spells.cantrips.length > 0);
    const hasPrepared = (charData.spells.prepared && charData.spells.prepared.length > 0);
    const hasSpellbook = (charData.spells.spellbook && charData.spells.spellbook.length > 0);
    const hasFavored = (charData.spells.favored && charData.spells.favored.length > 0);

    if (!hasCantrips && !hasPrepared && !hasSpellbook && !hasFavored) {
        const page5 = document.getElementById('page5-wrapper');
        if (page5) page5.remove(); 
        totalPages--; 
        console.log("Seite 5 (Zauber) ausgeblendet.");
    }

    // 2. ZAUBERBUCH-SEITE PRÜFEN (Seite 6)
    const isWizard = charData.basic.class && charData.basic.class.toLowerCase() === 'wizard';
    if (!isWizard) {
        const page6 = document.getElementById('page6-wrapper');
        if (page6) page6.remove(); 
        totalPages--;
        console.log("Seite 6 (Zauberbuch) ausgeblendet (Charakter ist kein Magier).");
    }

    // Fußzeilen sofort aktualisieren!
    document.querySelectorAll('.total-pages-display').forEach(el => {
        el.textContent = totalPages;
    });
    /* ========================================================== */
    
    // 3a. Kopfzeile
    processHeader(charData);
    
    // 3b. Attribute & Skills (Erstellen, Rechnen, Anzeigen)
    processAttributesAndSkills(charData);

    // 3c. Basis-Klassenberechnungen (HP, Trefferwürfel, Meisterschaften)
    processClassBasics(charData);

    // 3d. Werkzeuge 
    processTools(charData);

    // 3e. Ausrüstung
    processInventory(charData);

    // 3j. Volksmerkmale
    applySpeciesFeatureLogic(charData);
    processSpeciesTraits(charData);

    // 3f. KLassenmerkmale
    applyClassFeatureLogic(charData);
    processClassFeatures(charData);

    // 3g. Talente
    applyTalentFeatureLogic(charData);
    processFeats(charData);

    // 3h. Aussehen & Volksmerkmale
    processAppearance(charData);

    // 3i. Charaktergeschichte, Persönlichkeit und Gesinnung
    processStoryAndAlignment(charData);

    // 3k. Zauber
    processSpellsPage(charData);
    processSpellbookPage(charData);

    // 4. Events registrieren
    setupEventListeners();
    setupImageUploads();
    loadSavedImages();
    initAppendixToggle();
    applyFieldLocks();

    // 5. Übersetzungen

    console.log('Initialisierung abgeschlossen.');
};


/* ==========================================================================
   AREAL 2: DATEN AUS LOCAL STORAGE EMPFANGEN
   ========================================================================== */
function loadCharacterDataFromStorage() {
    const ls = localStorage;
    
    // Wir sammeln hier alle Raw-Daten ein.
    return {
        basic: {
            name: ls.getItem("characterName") || "",
            playerName: ls.getItem("playerName") || "",
            class: ls.getItem("class"),           
            background: ls.getItem("background"), 
            species: ls.getItem("species"),       
            lineage: ls.getItem("lineage"),
            ancestry: ls.getItem("ancestry"),     
            level: parseInt(ls.getItem("level")) || 1,
            xp: ls.getItem("xp") || ""
        },
        scores: {
            strength: ls.getItem("strengthScore"),
            dexterity: ls.getItem("dexterityScore"),
            constitution: ls.getItem("constitutionScore"),
            intelligence: ls.getItem("intelligenceScore"),
            wisdom: ls.getItem("wisdomScore"), // Dein Original-Fallback
            charisma: ls.getItem("charismaScore")
        },
        proficiencies: {
            // Hintergrund (Einzelwerte oder Arrays)
            bg_tools: JSON.parse(ls.getItem("tool_background")) || [], 
            bg_instruments: JSON.parse(ls.getItem("instrument_background")) || [],
            bg_games: JSON.parse(ls.getItem("game_background")) || [],
            bg_feat: ls.getItem("feat_background"), 

            // Klasse (Leere Arrays, werden in processTools aus classForm geholt, falls nötig)
            class_tools: [],       
            class_instruments: [], 
            class_games: [],

            // Sprachen
            languages: JSON.parse(ls.getItem("languages")) || []       
        },
	feats: {
            background: parseInt(ls.getItem("feat_background")) || null,
            species: parseInt(ls.getItem("feat_species")) || null
            // Hinweis: Klassen-Talente in classForm.feats
        },
        spells: {
            cantrips: JSON.parse(ls.getItem("cantrips")) || [],
            spellbook: JSON.parse(ls.getItem("spellbookSpells")) || [],
            prepared: JSON.parse(ls.getItem("preparedSpells")) || [],
            favored: JSON.parse(ls.getItem("favoredSpells")) || [],

            spellcastingAbility_species: ls.getItem("spellcastingAbility_species") || null,
            spellcastingAbility_talent: JSON.parse(ls.getItem("spellcastingAbility_talent")) || null
        },
        details: {
            story: ls.getItem("story") || "",
            deityId: ls.getItem("deityId") || "",
            deityName: ls.getItem("deityName") || "",
            communityName: ls.getItem("communityName") || "",
            communityDesc: ls.getItem("communityDesc") || "",
            alignment: ls.getItem("alignment") || "",
            personalityTraits: ls.getItem("personalityTraits") || ""
        },
        appearance: {
            gender: ls.getItem("gender") || "",
            age: ls.getItem("age") || "",
            eyeColor: ls.getItem("eyeColor") || "",
            hairColor: ls.getItem("hairColor") || "",
            skinTone: ls.getItem("skinTone") || "",
            size: ls.getItem("size") || "",
            description: ls.getItem("appearanceDescription") || ""
        },
        classForm: JSON.parse(ls.getItem('classForm')) || {},
        equipment: JSON.parse(ls.getItem('equipment')) || {},
        purse: JSON.parse(ls.getItem('purse')) || {}
    };
}


/* ==========================================================================
   AREAL 3: DATEN VERARBEITEN UND EINTRAGEN
   ========================================================================== */

/* --------------------------------------------------------------------------
   3 a. Kopfzeile ausfüllen
   -------------------------------------------------------------------------- */
function processHeader(data) {
    const basic = data.basic;
    
    // Unterklasse ermitteln
    let subclassCategoryNumber = data.classForm.subclass ? parseInt(data.classForm.subclass, 10) : null;
    const characterSubclass = getSubclassTranslation(basic.class, subclassCategoryNumber);

    // Übersetzungen (ABSTURZ-FIX & FLEXIBILITÄT)
    // Wir prüfen, ob basic.class existiert, bevor wir toLowerCase machen.
    const safeClassKey = basic.class ? basic.class.toLowerCase() : "";
    const safeBgKey = basic.background ? basic.background.toLowerCase() : "";
    const safeSpeciesKey = basic.species ? basic.species.toLowerCase() + "Label" : "";

    // Zugriff über currentLanguage
    const tClass = (translations[currentLanguage][safeClassKey]) || basic.class;
    const tBg = (translations[currentLanguage][safeBgKey]) || basic.background;
    const tSpecies = (translations[currentLanguage][safeSpeciesKey]) || basic.species;
    const tLineage = (basic.lineage && basic.lineage !== "null") ? (translations[currentLanguage][basic.lineage] || basic.lineage) : '';

    const speciesDisplay = tLineage ? `${tSpecies} (${tLineage})` : tSpecies;

    // Werte setzen
    setVal("characterName", basic.name);
    setVal("playerName", basic.playerName);
    setVal("class", tClass);
    setVal("level", basic.level);
    setVal("background", tBg);
    setVal("subclass", characterSubclass);
    setVal("species", speciesDisplay);

    // Name auf alle Folgeseiten synchronisieren
    document.querySelectorAll('.sync-char-name').forEach(input => {
        input.value = basic.name;
    });

    // --- XP LOGIK ---
    if (typeof XPList !== 'undefined') {
        const currentLevel = parseInt(basic.level, 10) || 1;
        const xpEntry = XPList.find(x => x.level === currentLevel);
        setVal("xp", xpEntry ? xpEntry.xp : 0);
    } else {
        setVal("xp", basic.xp || 0);
    }

}

function updateLevelFromXP() {
    const xpInput = document.getElementById('xp');
    const levelInput = document.getElementById('level');
    
    if (!xpInput || !levelInput || typeof XPList === 'undefined') return;

    let currentXP = parseInt(xpInput.value, 10);
    if (isNaN(currentXP)) currentXP = 0;

    // Wir suchen das höchste Level, dessen XP-Schwelle <= currentXP ist.
    // Dazu sortieren wir die Liste sicherheitshalber absteigend oder nutzen findReverse Logik.
    // Da XPList aufsteigend ist, gehen wir von hinten durch oder nutzen filter.
    
    // Trick: Wir filtern alle Levels, die wir "erreicht" haben, und nehmen davon das höchste.
    const reachedLevels = XPList.filter(entry => currentXP >= entry.xp);
    
    let newLevel = 1;
    if (reachedLevels.length > 0) {
        // Das letzte Element ist das höchste erreichte Level
        newLevel = reachedLevels[reachedLevels.length - 1].level;
    }

    // Wenn sich das Level geändert hat, Input aktualisieren und Folge-Berechnungen starten
    const oldLevel = parseInt(levelInput.value, 10);
    if (newLevel !== oldLevel) {
        levelInput.value = newLevel;
        
        // WICHTIG: Wenn sich das Level ändert, ändert sich auch der Prof. Bonus und ggf. HP
        updateProficiencyBonus();
        
        // Optional: HP neu berechnen (da diese von Level abhängen)
        // Hinweis: Das benötigt Zugriff auf 'conMod' und 'hitDie', die wir hier gerade nicht griffig haben.
        // Falls gewünscht, müsste man processClassBasics(charData) neu aufrufen, 
        // was aber ein Reload der Daten erfordert. Fürs Erste reicht ProfBonus.
    }
}

/**
 * Setzt die XP auf den Mindestwert, wenn der Nutzer das Level manuell ändert.
 */
function updateXPFromLevel() {
    const xpInput = document.getElementById('xp');
    const levelInput = document.getElementById('level');
    
    if (!xpInput || !levelInput || typeof XPList === 'undefined') return;

    let newLevel = parseInt(levelInput.value, 10);
    if (isNaN(newLevel) || newLevel < 1) newLevel = 1;
    if (newLevel > 20) newLevel = 20; // Cap bei 20

    // Den XP-Wert für dieses Level finden
    const xpEntry = XPList.find(x => x.level === newLevel);
    
    if (xpEntry) {
        xpInput.value = xpEntry.xp;
        
        // Auch hier: Prof Bonus updaten
        updateProficiencyBonus();
    }
}

/**
 * Berechnet HP und Trefferwürfel neu (wird bei Level- oder Con-Änderung gerufen).
 */
function updateHitPointsAndDice() {
    // 1. Benötigte Werte aus dem DOM holen
    const levelInput = document.getElementById('level');
    const conModInput = document.getElementById('constitutionModifier');
    const hpInput = document.getElementById('maxHP');
    const hdInput = document.getElementById('maxHD');
    
    // Daten laden (für Klassen-Info)
    const charData = loadCharacterDataFromStorage();
    // WICHTIG: Das Level im charData ist evtl. veraltet, daher überschreiben wir es mit dem Live-Wert
    const currentLevel = parseInt(levelInput.value, 10) || 1;
    charData.basic.level = currentLevel;

    const className = charData.basic.class;
    if (!className) return;

    // Klassendaten finden
    const classData = classCoreTraitsList.find(c => c.translationLabel.toLowerCase() === className.toLowerCase());
    if (!classData) return;

    const conMod = parseInt(conModInput.value, 10) || 0;
    const hitDieString = classData.hitPointDie; // z.B. "D12"

    // --- A. TREFFERWÜRFEL TEXT UPDATE ---
    if (hdInput) {
        hdInput.value = `${currentLevel}x ${hitDieString}`;
    }

    // --- B. BASIS HP BERECHNUNG ---
    const dieMax = parseInt(hitDieString.replace('D', ''), 10); 
    const dieAvg = (dieMax / 2) + 1; 

    let newMaxHP = 0;
    
    // Level 1: Max + Con
    newMaxHP += (dieMax + conMod);

    // Level 2+: Avg + Con
    if (currentLevel > 1) {
        newMaxHP += (currentLevel - 1) * (dieAvg + conMod);
    }

    // Wert schreiben
    if (hpInput) {
        hpInput.value = newMaxHP;

        // --- C. FLAGS RESETTEN ---
        // WICHTIG: Damit Talente wie 'Tough' oder 'Boon' ihren Bonus NEU berechnen können,
        // müssen wir die Markierungen löschen, dass sie schon angewendet wurden.
        delete hpInput.dataset.toughApplied;
        delete hpInput.dataset.boonFortitudeApplied;
    }

    // --- D. TALENTE NEU ANWENDEN ---
    // Das fügt Boni (wie +2 pro Level durch Tough) wieder oben drauf
    applyTalentFeatureLogic(charData);
    processSpeciesTraits(charData);
    applyTalentFeatureLogic(charData);
}

/**
 * Berechnet die finale Bewegungsrate aus: Spezies (Basis) + Klasse + Talente
 */
function calculateFinalSpeed() {
    // 1. Basis-Speed aus der Spezies holen ODER Override (Waldelf) nutzen
    const charData = loadCharacterDataFromStorage();
    let baseSpeedFT = 30; // Standard Fallback

    if (window.baseSpeedOverride) {
        // --- HIER greift der Waldelf ein (35 Fuß = 10.5m) ---
        baseSpeedFT = window.baseSpeedOverride; 
    } else {
        // Normale Berechnung für alle anderen Spezies
        const rawSpecies = charData.basic.species || ""; 
        const searchTerm = rawSpecies.toLowerCase() + "Label";
        if (typeof speciesList !== 'undefined') {
            const sData = speciesList.find(s => s.translationLabel === searchTerm);
            if (sData) baseSpeedFT = sData.speedFT;
        }
    }

    // 2. Globale Boni abrufen (oder 0, falls noch nicht gesetzt)
    const bonusClass = window.speedBonusClass || 0;
    const bonusTalent = window.speedBonusTalent || 0;

    // 3. Gesamtsumme
    const totalSpeedFT = baseSpeedFT + bonusClass + bonusTalent;

    // 4. Anzeige aktualisieren
    const speedField = document.getElementById('speed');
    if (speedField) {
        if (currentLanguage === 'de') {
            const speedM = Math.round((totalSpeedFT / 5) * 1.5 * 10) / 10; 
            speedField.value = `${speedM} m`;
        } else {
            speedField.value = `${totalSpeedFT} ft`;
        }
    }
}

// Helper für 3a
function getSubclassTranslation(classType, subclassCategoryNumber) {
    if (!classType) return '';

    // Mapping mit Sicherheitscheck (falls eine Datei mal nicht geladen wurde)
    const subclassLists = {
        'barbarian': (typeof subclassListBarbarian !== 'undefined') ? subclassListBarbarian : [],
        'bard': (typeof subclassListBard !== 'undefined') ? subclassListBard : [],
        'cleric': (typeof subclassListCleric !== 'undefined') ? subclassListCleric : [],
        'druid': (typeof subclassListDruid !== 'undefined') ? subclassListDruid : [],
        'fighter': (typeof subclassListFighter !== 'undefined') ? subclassListFighter : [],
        'monk': (typeof subclassListMonk !== 'undefined') ? subclassListMonk : [],
        'paladin': (typeof subclassListPaladin !== 'undefined') ? subclassListPaladin : [],
        'ranger': (typeof subclassListRanger !== 'undefined') ? subclassListRanger : [],
        'rogue': (typeof subclassListRogue !== 'undefined') ? subclassListRogue : [],
        'sorcerer': (typeof subclassListSorcerer !== 'undefined') ? subclassListSorcerer : [],
        'warlock': (typeof subclassListWarlock !== 'undefined') ? subclassListWarlock : [],
        'wizard': (typeof subclassListWizard !== 'undefined') ? subclassListWizard : []
    };

    const list = subclassLists[classType.toLowerCase().trim()];
    if (!list) return '';

    const subclassData = list.find(s => s.subclassCategoryNumber === subclassCategoryNumber);
    
    // Nutzung von globaler Variable 'currentLanguage' statt 'de'
    if (subclassData && translations[currentLanguage]) {
        return translations[currentLanguage][subclassData.translationLabel] || subclassData.translationLabel;
    }
    
    return '';
}

function updateSizeCategory() {
    const sizeInput = document.getElementById('physSize'); // Seite 4
    const categoryOutput = document.getElementById('sizeCategory'); // Seite 1
    
    if (!sizeInput || !categoryOutput || typeof sizeList === 'undefined') return;

    const rawVal = sizeInput.value;
    
    // Wenn nichts drin steht oder es der Default "-" ist
    if (!rawVal || rawVal.trim() === "-" || rawVal.trim() === "") {
        categoryOutput.value = "-";
        return;
    }

    // 1. Zahl extrahieren (Komma durch Punkt ersetzen, falls jemand "1,88" eintippt, und alles außer Zahlen/Punkten entfernen)
    const numVal = parseFloat(rawVal.replace(',', '.').replace(/[^\d.]/g, ''));
    if (isNaN(numVal)) return;

    // 2. In Feet umrechnen (1 Fuß = 30.48 cm)
    let feetVal = numVal;
    if (currentLanguage === 'de' || rawVal.toLowerCase().includes('cm')) {
        feetVal = numVal / 30.48;
    }

    // 3. Kategorie anhand der sizeList ermitteln
    let foundLabel = "mediumLabel"; // Standard-Fallback
    for (const size of sizeList) {
        if (feetVal >= size.sizeRange_ft[0] && feetVal <= size.sizeRange_ft[1]) {
            foundLabel = size.sizeCategory;
            break;
        }
    }
    
    // Fallbacks, falls jemand extrem klein (< 0.0) oder extrem riesig (> 10.0) ist
    if (feetVal < sizeList[0].sizeRange_ft[0]) foundLabel = sizeList[0].sizeCategory;
    if (feetVal > sizeList[sizeList.length - 1].sizeRange_ft[1]) foundLabel = sizeList[sizeList.length - 1].sizeCategory;

    // 4. Übersetzen und Eintragen
    const t = translations[currentLanguage] || {};
    categoryOutput.value = t[foundLabel] || foundLabel;
}


/* --------------------------------------------------------------------------
   3 b. Attribute und Skills vergeben
   -------------------------------------------------------------------------- */
function processAttributesAndSkills(data) {
    // 1. Struktur aufbauen (Leere Skill-Listen erstellen)
    initializeSkills();

    // 2. Attributswerte eintragen
    attributeList.forEach(attr => {
        const stringId = attr.translationLabel.replace('Label', '');
        const val = data.scores[stringId];
        if (val) setVal(`${stringId}Score`, val);
    });

    // 3. Checkboxen aktivieren
    const skills = data.classForm.skills || [];
    activateSkills(skills);
    activateSavingThrows(data.basic.class);

    // 4. Berechnungen anstoßen (Modifier, ProfBonus, Skill-Totals)
    updateProficiencyBonus();
    updateModifiers(); 
}

// --- Funktionen für 3b (Struktur & Aktivierung) ---
function initializeSkills() {
    const attributes = attributeList;
    const skills = skillList;

    attributes.forEach(attribute => {
        const skillContainer = document.getElementById(attribute.translationLabel.replace('Label', 'Skills'));
        if (skillContainer && attribute.skillCategoryNumber) {
            const skillNumbers = Array.isArray(attribute.skillCategoryNumber) ? attribute.skillCategoryNumber : [attribute.skillCategoryNumber];
            skillNumbers.forEach(skillNumber => {
                const skillData = skills.find(skill => skill.skillCategoryNumber === skillNumber);
                if (skillData) {
                    const div = document.createElement('div');
                    div.className = 'skill';
                    
                    const skillName = (translations[currentLanguage] && translations[currentLanguage][skillData.translationLabel]) 
                                      ? translations[currentLanguage][skillData.translationLabel] 
                                      : skillData.translationLabel;

                    div.innerHTML = `
                        <input type="checkbox" id="${skillData.translationLabel}Trained" class="rounded-checkbox">
                        <input type="text" class="skill-value" readonly>
                        <label for="${skillData.translationLabel}Trained" id="${skillData.translationLabel}">
                            ${skillName}
                        </label>`;
                    skillContainer.appendChild(div);
                }
            });
        }
    });
}

function activateSkills(selectedSkillNumbers) {
    const skills = skillList;
    selectedSkillNumbers.forEach(skillNumber => {
        const skillData = skills.find(skill => skill.skillCategoryNumber.toString() === skillNumber);
        if (skillData) {
            const checkboxId = `${skillData.translationLabel}Trained`;
            const checkbox = document.getElementById(checkboxId);
            if (checkbox) checkbox.checked = true;
            else console.warn(`Checkbox mit ID ${checkboxId} nicht gefunden.`);
        }
    });
}

function activateSavingThrows(className) {
    if (!className) return;
    const classData = classCoreTraitsList.find(c => c.translationLabel.toLowerCase() === className.toLowerCase());
    if (classData && classData.savingThrowProficiencies) {
        classData.savingThrowProficiencies.forEach(attrLabel => {
            const checkboxId = `${attrLabel.replace('Label', '')}SavingTrained`;
            const checkbox = document.getElementById(checkboxId);
            if (checkbox) checkbox.checked = true;
        });
    }
}

// --- Rechen-Logik für 3b ---
function calculateModifier(score) {
    let modifier;
    if (score <= 3) modifier = -4;
    else if (score <= 5) modifier = -3;
    else if (score <= 7) modifier = -2;
    else if (score <= 9) modifier = -1;
    else if (score <= 11) modifier = 0;
    else if (score <= 13) modifier = 1;
    else if (score <= 15) modifier = 2;
    else if (score <= 17) modifier = 3;
    else if (score <= 19) modifier = 4;
    else if (score == 20) modifier = 5;
    else modifier = ''; // Original Logik
    
    return modifier >= 1 ? `+${modifier}` : `${modifier}`;
}

function calculateProficiencyBonus(level) {
    if (level <= 4) return 2;
    if (level <= 8) return 3;
    if (level <= 12) return 4;
    if (level <= 16) return 5;
    if (level <= 20) return 6;
    return 2;
}

// Live-Update Funktionen
function updateModifiers() {
    const attributes = ["strength", "dexterity", "wisdom", "constitution", "intelligence", "charisma"];
    attributes.forEach(attribute => {
        const scoreInput = document.getElementById(`${attribute}Score`);
        const modifierInput = document.getElementById(`${attribute}Modifier`);
        if (scoreInput && modifierInput) {
            const score = parseInt(scoreInput.value, 10);
            const modifier = calculateModifier(score);
            modifierInput.value = modifier !== '' ? modifier : '';
        }
    });
    // Trigger Updates für abhängige Werte
    updateSavingThrowValues();
    updateSkillValues();
    updateDerivedStats();
    
    // Auch Angriffe aktualisieren, wenn sich die Stats ändern ---
    updatePhysicalAttacks(); 
}

function updateDerivedStats() {
    // 1. Initiative setzen (Basiert auf Geschicklichkeits-Modifikator)
    const dexModInput = document.getElementById('dexterityModifier');
    const initInput = document.getElementById('initiative');
    
    if (dexModInput && initInput) {
        const dexMod = parseInt(dexModInput.value, 10) || 0;
        // Formatierung mit Vorzeichen (z.B. +2 oder -1)
        initInput.value = dexMod >= 0 ? `+${dexMod}` : `${dexMod}`;
    }

    // 2. Passive Wahrnehmung berechnen (10 + Weisheits-Modifikator)
    // Hinweis: Nach D&D 5e Regeln wird hier normalerweise noch der Übungsbonus addiert, 
    // falls man in Wahrnehmung geübt ist. Wir nutzen hier strikt deine Formel (10 + Wis).
    const wisModInput = document.getElementById('wisdomModifier');
    const passPercInput = document.getElementById('passivePerception');

    if (wisModInput && passPercInput) {
        const wisMod = parseInt(wisModInput.value, 10) || 0;
        passPercInput.value = 10 + wisMod;
    }
}

function updateProficiencyBonus() {
    const level = parseInt(document.getElementById("level").value, 10) || 1;
    const bonus = calculateProficiencyBonus(level);
    const bonusInput = document.getElementById('proficiencyBonus');
    if (bonusInput) bonusInput.value = `+${bonus}`;

    // --- Angriffe aktualisieren, da der Bonus Teil des Angriffs ist ---
    updatePhysicalAttacks();
    
    // (Optional: Auch Skills/Saves neu berechnen, da PB sich geändert hat)
    updateSkillValues();
    updateSavingThrowValues();
}

function updateSkillValues() {
    const level = parseInt(document.getElementById("level").value, 10) || 1;
    const proficiencyBonus = calculateProficiencyBonus(level);
    
    // Hol die Expertise-IDs aus dem globalen Speicher
    const expertiseIDs = window.activeExpertiseIDs || [];

    attributeList.forEach(attribute => {
        const stringId = attribute.translationLabel.replace('Label', '');
        const modifier = parseInt(document.getElementById(`${stringId}Modifier`).value, 10) || 0;
        const skillContainer = document.getElementById(`${stringId}Skills`);

        if (skillContainer) {
            skillContainer.querySelectorAll('.skill').forEach(skillDiv => {
                const checkbox = skillDiv.querySelector('.rounded-checkbox');
                const valueInput = skillDiv.querySelector('.skill-value');
                const label = skillDiv.querySelector('label');

                if(checkbox && valueInput && label) {
                    // Wir finden die skillCategoryNumber anhand des Labels (ID des Labels im HTML)
                    const skillData = skillList.find(s => s.translationLabel === label.id);
                    
                    let finalValue = modifier;
                    if (checkbox.checked) {
                        finalValue += proficiencyBonus;
                        
                        // EXPERTISE CHECK: Wenn geübt UND in der Expertise-Liste
                        if (skillData && expertiseIDs.includes(skillData.skillCategoryNumber)) {
                            finalValue += proficiencyBonus; // Bonus ein zweites Mal addieren
                        }
                    }
                    
                    valueInput.value = finalValue >= 0 ? `+${finalValue}` : finalValue;
                }
            });
        }
    });
}

function updateSavingThrowValues() {
    const level = parseInt(document.getElementById("level").value, 10) || 1;
    const proficiencyBonus = calculateProficiencyBonus(level);

    attributeList.forEach(attribute => {
        const stringId = attribute.translationLabel.replace('Label', '');
        const modifier = parseInt(document.getElementById(`${stringId}Modifier`).value, 10) || 0;
        const checkbox = document.getElementById(`${stringId}SavingTrained`);
        const valueInput = document.getElementById(`${stringId}SavingValue`);

        if (checkbox && valueInput) {
            let finalValue = modifier;
            if (checkbox.checked) finalValue += proficiencyBonus;
            valueInput.value = finalValue >= 0 ? `+${finalValue}` : finalValue;
        }
    });
}


/* --------------------------------------------------------------------------
   3 c. Basis-Klassenberechnungen & Kampfwerte
   -------------------------------------------------------------------------- */
function processClassBasics(data) {
    if (!data.basic.class) return;

    // Klassendaten holen
    const classData = classCoreTraitsList.find(c => c.translationLabel.toLowerCase() === data.basic.class.toLowerCase());
    if (!classData) return;

    const level = data.basic.level;
    
    // Modifikatoren auslesen (müssen durch updateModifiers bereits im DOM sein)
    const conMod = parseInt(document.getElementById('constitutionModifier').value, 10) || 0;
    const dexMod = parseInt(document.getElementById('dexterityModifier').value, 10) || 0;
    const wisMod = parseInt(document.getElementById('wisdomModifier').value, 10) || 0;


    // --- 1. TREFFERWÜRFEL (HIT DICE) ---
    const hitDieString = classData.hitPointDie; // z.B. "D12"
    const hdInput = document.getElementById('maxHD');
    if (hdInput) {
        hdInput.value = `${level}x ${hitDieString}`;
    }


    // --- 2. MAX. TREFFERPUNKTE (HP) ---
    // Level 1: Max + Con
    // Level 2+: Avg + Con
    const dieMax = parseInt(hitDieString.replace('D', ''), 10); 
    const dieAvg = (dieMax / 2) + 1; // 12->7, 10->6, 8->5, 6->4

    let maxHP = 0;
    
    // Level 1
    maxHP += (dieMax + conMod);

    // Level 2+
    if (level > 1) {
        maxHP += (level - 1) * (dieAvg + conMod);
    }

    setVal('maxHP', maxHP);
    
    // Initiale HP setzen, falls leer
    const currentHPField = document.getElementById('currentHP');
    if (currentHPField && currentHPField.value === "") {
        currentHPField.value = maxHP;
    }


    // --- 3. WAFFEN ---

    // a. Waffenkategorien (Proficiencies)
    if (classData.weaponCategoryNumber) {
        setProficiencies(classData.weaponCategoryNumber, 'weapon');
    }

// b. Waffeneigenschaften (Textfeld)
    if (classData.weaponPropertyCategoryNumber && typeof weaponProperty !== 'undefined') {        
        const rawProps = classData.weaponPropertyCategoryNumber;
        const propIds = Array.isArray(rawProps) ? rawProps : [rawProps];

        const propNames = propIds.map(id => {
            const propData = weaponProperty.find(p => p.weaponPropertyCategoryNumber === id);
            if (!propData) return null;
            
            return (translations[currentLanguage] && translations[currentLanguage][propData.translationLabel]) 
                   ? translations[currentLanguage][propData.translationLabel] 
                   : propData.translationLabel;
        }).filter(n => n !== null);

        const propField = document.getElementById('weaponProperties');
        if (propField) propField.value = propNames.join(", ");
    }

// c. Waffenmeisterschaften (Textfeld)
    // Format: "Waffenname (Meisterschaftseffekt)"
    if (data.classForm.weaponMastery && data.classForm.weaponMastery.length > 0) {
        
        // Sicherheitscheck: Sind die Listen da?
        if (typeof weaponList !== 'undefined' && typeof weaponMastery !== 'undefined') {
            
            const selectedWeaponIds = data.classForm.weaponMastery; 
            const entries = []; 

            selectedWeaponIds.forEach(idRaw => {
                const weaponId = parseInt(idRaw, 10);
                
                // 1. Die Waffe in der Waffenliste suchen
                const weaponObj = weaponList.find(w => w.ID === weaponId);
                
                if (weaponObj && weaponObj.weaponMasteryCategoryNumber) {
                    
                    // 2. Den Meisterschafts-Effekt suchen
                    const masteryDef = weaponMastery.find(m => m.weaponMasteryCategoryNumber === weaponObj.weaponMasteryCategoryNumber);
                    
                    if (masteryDef) {
                        // 3. Beides übersetzen
                        const weaponName = (translations[currentLanguage] && translations[currentLanguage][weaponObj.translationLabel]) 
                                           ? translations[currentLanguage][weaponObj.translationLabel] 
                                           : weaponObj.translationLabel;

                        const masteryName = (translations[currentLanguage] && translations[currentLanguage][masteryDef.translationLabel]) 
                                            ? translations[currentLanguage][masteryDef.translationLabel] 
                                            : masteryDef.translationLabel;
                        
                        // 4. String formatieren: "Streitaxt (Spalten)"
                        entries.push(`${weaponName} (${masteryName})`);
                    }
                }
            });

            // 5. Als kommagetrennte Liste ins Feld schreiben
            const masteryField = document.getElementById('weaponMasteries');
            if (masteryField) {
                masteryField.value = entries.join(", ");
            }

        } else {
            console.warn("weaponList oder weaponMastery Datenbank fehlt!");
        }
    }

    // --- 4. RÜSTUNGSKATEGORIEN ---
    if (classData.armorCategoryNumber) {
        setProficiencies(classData.armorCategoryNumber, 'armor');
    }

    // --- 5. RÜSTUNGSKLASSE (AC) ---
    // Wir rufen die zentrale Funktion auf, die Inventar & Stats prüft
    updateArmorClass();
}

// Helper für Meisterschaften (Checkboxen)
function setProficiencies(categories, type) {
    const cats = Array.isArray(categories) ? categories : [categories];
    cats.forEach(cat => {
        let id = null;
        if (type === 'armor') {
            if (cat === 1) id = 'lightArmor';
            if (cat === 2) id = 'mediumArmor';
            if (cat === 3) id = 'heavyArmor';
            if (cat === 4) id = 'shieldProf';
        } else if (type === 'weapon') {
            if (cat === 1) id = 'simpleMeleeWeapons';
            if (cat === 2) id = 'simpleRangedWeapons';
            if (cat === 3) id = 'martialMeleeWeapons';
            if (cat === 4) id = 'martialRangedWeapons';
        }
        
        if (id) {
            const cb = document.getElementById(id);
            if (cb) cb.checked = true;
        }
    });
}

/**
 * Wird aufgerufen, wenn eine Rüstungs-Checkbox geklickt wird.
 * Aktualisiert AC und berechnet danach sofort alle Merkmale (Speed etc.) neu.
 */
function handleArmorChange() {
    // 1. Zuerst die Rüstungs-Logik (Sperren & AC-Wert)
    updateArmorClass(); 

    // 2. Daten laden (für Basiswerte)
    const charData = loadCharacterDataFromStorage();

    // 3. WICHTIG: Klassen- und Talent-Logik neu anstoßen!
    // Dadurch werden die Handler (fastMovement, unarmoredMovement) ausgeführt,
    // die jetzt den neuen Checkbox-Status prüfen.
    applyClassFeatureLogic(charData); 
    applyTalentFeatureLogic(charData);
}

/* --------------------------------------------------------------------------
   3 d. Gemeisterte Werkzeug
   -------------------------------------------------------------------------- */
function processTools(data) {
    const textArea = document.getElementById('masteredTools');
    if (!textArea) return;

    // 1. Priorität: Manuell gespeicherter Text (falls vorhanden)
    if (data.status && data.status.masteredTools_text) {
        textArea.value = data.status.masteredTools_text;
        return; 
    }

    // Set verhindert doppelte Einträge automatisch
    let collectedNames = new Set();

    // Helper Funktion: IDs verarbeiten
    // listType: 1=Tool, 2=Instrument, 3=Game
    const addById = (ids, listType) => {
        if (!ids) return;
        const idArray = Array.isArray(ids) ? ids : [ids];

        idArray.forEach(rawId => {
            const id = parseInt(rawId, 10);
            if (isNaN(id) || id === 0) return;

            let item = null;

            // A. Werkzeuge
            if (listType === 1 && typeof toolList !== 'undefined') {
                item = toolList.find(t => t.ID === id);
            }
            // B. Instrumente
            else if (listType === 2 && typeof instrumentList !== 'undefined') {
                item = instrumentList.find(i => i.instrumentCategoryNumber === id);
            }
            // C. Spiele
            else if (listType === 3 && typeof gameList !== 'undefined') {
                item = gameList.find(g => g.gameCategoryNumber === id);
            }

            // Wenn gefunden, Name übersetzen und zum Set hinzufügen
            if (item) {
                const label = (translations[currentLanguage] && translations[currentLanguage][item.translationLabel]) 
                              ? translations[currentLanguage][item.translationLabel] 
                              : item.translationLabel;
                
                collectedNames.add(label);
            }
        });
    };;

    // --- QUELLE 1-3: HINTERGRUND DATEN ---
    
    // 1. Werkzeuge
    addById(data.proficiencies.bg_tools, 1);

    // 2. Instrumente
    addById(data.proficiencies.bg_instruments, 2);

    // 3. Spiele
    addById(data.proficiencies.bg_games, 3);
    
    // (Hinweis: bg_tools hattest du oben in der Liste nicht explizit genannt, 
    // aber falls 'tool_background' existiert, würde es hier auch Sinn machen: 
    // addById(data.proficiencies.bg_tools, 1); )


    // --- QUELLE 4-6: KLASSE (classForm) ---
    if (data.classForm) {
        // 4. classForm => tools
        if (data.classForm.tools) {
            addById(data.classForm.tools, 1);
        }

        // 5. classForm => instruments
        if (data.classForm.instruments) {
            addById(data.classForm.instruments, 2);
        }

        // 6. classForm => games
        if (data.classForm.games) {
            addById(data.classForm.games, 3);
        }
    }

    // --- AUSGABE ---
    if (collectedNames.size > 0) {
        // Set -> Array -> Sortieren -> String
        textArea.value = Array.from(collectedNames).sort().join(", ");
    }
}


/* --------------------------------------------------------------------------
   3 e. Ausrüstung (Inventar & Geldbörse)
   -------------------------------------------------------------------------- */

function processInventory(data) {
    
    // --- 1. GELDBÖRSE ---
    if (data.purse) {
        ['pp', 'gp', 'ep', 'sp', 'cp'].forEach(coin => {
            const field = document.getElementById(coin);
            if (field) {
                let val = parseInt(data.purse[coin.toUpperCase()] || 0, 10);
                field.value = Math.max(0, val); 
            }
        });
    }

    // --- 2. INVENTAR TABELLEN ---
    const boxConfig = [
        { id: 1, source: data.equipment.weapons,  rows: 10, col3: 'checkbox' },
        { id: 2, source: data.equipment.armor,    rows: 6,  col3: 'checkbox' }, 
        { id: 3, source: data.equipment.vehicles, rows: 5,  col3: 'capacity' },
        { id: 4, source: data.equipment.tools,    rows: 4,  col3: 'type' },
        { id: 5, source: data.equipment.gear,     rows: 20, col3: 'type' }      
    ];

    // Schalter, um sicherzustellen, dass nur EINE Rüstung angelegt wird
    let armorAlreadyEquipped = false;

    boxConfig.forEach(box => {
        const headerEl = document.getElementById(`th_amount_${box.id}`);
        if (!headerEl) return;

        const tableBody = headerEl.closest('table').querySelector('tbody');
        const rows = tableBody.querySelectorAll('tr');
        
        let items = box.source || [];
        items = expandInventoryPacks(items); 
        items = mergeDuplicateItems(items);

        // --- A. AUTO-EQUIP VORBEREITUNG ---
        const strScore = parseInt(data.scores.strength) || 10;
        const dexScore = parseInt(data.scores.dexterity) || 10;
        const strMod = Math.floor((strScore - 10) / 2);
        const dexMod = Math.floor((dexScore - 10) / 2);

        const className = data.basic.class; 
        const canAutoEquipArmor = (className !== "Barbarian" && className !== "Monk");

        let maxWeaponMod = -999;
        let maxArmorAC = -1;

        if (box.id === 1 && typeof weaponList !== 'undefined') {
            items.forEach(item => {
                const wData = weaponList.find(w => w.translationLabel === item.label);
                if (wData) {
                    const mod = calculateBestWeaponMod(wData, strMod, dexMod);
                    if (mod > maxWeaponMod) maxWeaponMod = mod;
                }
            });
        }

        if (box.id === 2 && canAutoEquipArmor && typeof armorList !== 'undefined') {
            items.forEach(item => {
                if (item.label === 'shieldLabel') return;
                const aData = armorList.find(a => a.translationLabel === item.label);
                if (aData) {
                    const ac = parseInt(aData.armorClass) || 0;
                    if (ac > maxArmorAC) maxArmorAC = ac;
                }
            });
        }

        // --- B. ZEILEN ZEICHNEN ---
        for (let i = 0; i < box.rows; i++) {
            if (!rows[i]) break; 
            const row = rows[i];
            const inputs = row.querySelectorAll('input');

            if (i < items.length) {
                const item = items[i];
                inputs[0].value = item.amount || 1;

                let rawLabel = item.selectedVaries ? item.selectedVaries : item.label;
                let translatedName = (translations[currentLanguage] && translations[currentLanguage][rawLabel]) 
                                     ? translations[currentLanguage][rawLabel] 
                                     : rawLabel;
                
                if (box.id === 2 && typeof armorList !== 'undefined') {
                    const armorData = armorList.find(a => a.translationLabel === item.label);
                    if (armorData && armorData.translationShortLabel && armorData.translationShortLabel !== 0) {
                        const shortName = (translations[currentLanguage] && translations[currentLanguage][armorData.translationShortLabel]) 
                                          ? translations[currentLanguage][armorData.translationShortLabel] 
                                          : armorData.translationShortLabel;
                        translatedName = `${translatedName} (${shortName})`;
                    }
                }
                inputs[1].value = translatedName;

                if (box.col3 === 'checkbox') {
                    inputs[2].setAttribute('data-index', i);
                    
                    if (box.id === 1) { // WAFFEN
                        inputs[2].setAttribute('onchange', 'updatePhysicalAttacks()');
                        let shouldCheck = false;
                        if (typeof weaponList !== 'undefined') {
                            const wData = weaponList.find(w => w.translationLabel === item.label);
                            if (wData) {
                                const thisMod = calculateBestWeaponMod(wData, strMod, dexMod);
                                if (thisMod >= maxWeaponMod) shouldCheck = true;
                            }
                        }
                        inputs[2].checked = shouldCheck;
                    } 
                    else if (box.id === 2) { // RÜSTUNG
                        let shouldCheckArmor = false;

                        // 1. Wenn es ein Schild ist, darf er immer zusätzlich angelegt werden
                        if (item.label === 'shieldLabel') {
                            shouldCheckArmor = (item.equipped === true);
                        } 
                        // 2. Normale Rüstung: Nur wenn noch keine andere angelegt wurde
                        else if (!armorAlreadyEquipped) {
                            // Entweder bereits im Speicher markiert...
                            if (item.equipped === true) {
                                shouldCheckArmor = true;
                                armorAlreadyEquipped = true;
                            } 
                            // ...oder es ist die beste Rüstung (Auto-Equip)
                            else if (canAutoEquipArmor) {
                                const aData = armorList.find(a => a.translationLabel === item.label);
                                if (aData && (parseInt(aData.armorClass) || 0) === maxArmorAC) {
                                    shouldCheckArmor = true;
                                    item.equipped = true; 
                                    armorAlreadyEquipped = true; // Sperre für weitere Rüstungen setzen
                                }
                            }
                        } else {
