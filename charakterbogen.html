                            // Falls durch fehlerhafte Daten mehrere auf true standen, 
                            // setzen wir alle weiteren auf false
                            item.equipped = false;
                        }

                        inputs[2].checked = shouldCheckArmor;

                        if (item.label === 'shieldLabel') {
                            inputs[2].setAttribute('onchange', 'toggleShield(this, "inventory")');
                            inputs[2].classList.add('inventory-shield-checkbox'); 
                        } else {
                            inputs[2].setAttribute('onchange', 'handleArmorChange()');
                        }
                    }
                }
                else if (box.col3 === 'capacity') inputs[2].value = getCapacityString(item.label);
                else if (box.col3 === 'type') {
                    const typeKey = item.typeLabel;
                    const translatedType = (translations[currentLanguage] && translations[currentLanguage][typeKey]) ? translations[currentLanguage][typeKey] : typeKey;
                    inputs[2].value = (!typeKey || typeKey === 'singleItemLabel') ? "-" : translatedType;
                }
            } else {
                // Leerzeilen zurücksetzen...
                if(inputs[0]) inputs[0].value = "";
                if(inputs[1]) inputs[1].value = "";
                if(inputs[2]) {
                    if (inputs[2].type === "checkbox") {
                        inputs[2].checked = false;
                        inputs[2].removeAttribute('onchange');
                    } else {
                        inputs[2].value = "";
                    }
                }
            }
        }
    });

    updatePhysicalAttacks();
    if (typeof applyClassFeatureLogic === 'function') applyClassFeatureLogic(data);
    updateArmorClass();
}

/**
 * Hilfsfunktion: Berechnet den besten Attributs-Modifikator für eine Waffe.
 * (Genutzt für Auto-Equip Logik)
 */
function calculateBestWeaponMod(weaponData, strMod, dexMod) {
    // Ist es eine Fernkampfwaffe? (Kat 2 = Einfach Fernkampf, Kat 4 = Kriegswaffe Fernkampf)
    const isRanged = (weaponData.weaponCategoryNumber === 2 || weaponData.weaponCategoryNumber === 4);
    
    let isFinesse = false;
    let isLight = false; 
    
    if (weaponData.weaponPropertyCategoryNumber) {
        const props = Array.isArray(weaponData.weaponPropertyCategoryNumber) 
                      ? weaponData.weaponPropertyCategoryNumber 
                      : [weaponData.weaponPropertyCategoryNumber];
        
        if (props.includes(2)) isFinesse = true; // 2 = Finesse

        // Prüfen, ob die Waffe "Leicht" ist
        if (typeof weaponProperty !== 'undefined') {
            const lightProp = weaponProperty.find(p => p.translationLabel === 'lightLabel');
            if (lightProp && props.includes(lightProp.weaponPropertyCategoryNumber)) {
                isLight = true;
            }
        }
    }

    // --- KORRIGIERTE MÖNCHS-REGEL ---
    // Gilt NUR für Nahkampfwaffen (!isRanged), die Leicht sind ODER Einfache Nahkampfwaffen (Kat 1) sind
    if (window.hasMartialArts && !isRanged && (isLight || weaponData.weaponCategoryNumber === 1)) {
        isFinesse = true; 
    }

    if (isFinesse) {
        return Math.max(strMod, dexMod);
    } else if (isRanged) {
        return dexMod;
    } else {
        return strMod;
    }
}

/**
 * Führt identische Items zusammen und addiert deren Mengen.
 * Ein Item gilt als identisch, wenn Label UND selectedVaries gleich sind.
 */
function mergeDuplicateItems(items) {
    const mergedMap = new Map();

    items.forEach(item => {
        // Eindeutigen Schlüssel generieren
        // Unterscheidung: "Langschwert" vs. "Kurzschwert" (auch wenn beide label="martialMelee" hätten)
        const uniqueKey = item.selectedVaries ? item.selectedVaries : item.label;

        if (mergedMap.has(uniqueKey)) {
            // Item existiert schon -> Menge addieren
            const existingItem = mergedMap.get(uniqueKey);
            existingItem.amount += (item.amount || 1);
        } else {
            // Item neu anlegen (Kopie, um Originaldaten nicht zu verändern)
            // Wir nutzen JSON parse/stringify für eine saubere Deep Copy des Objekts
            const newItem = JSON.parse(JSON.stringify(item));
            mergedMap.set(uniqueKey, newItem);
        }
    });

    // Map zurück in Array wandeln
    return Array.from(mergedMap.values());
}

/**
 * Durchsucht die Item-Liste. Wenn ein Item ein "Pack" ist, wird es entfernt
 * und durch seinen Inhalt (aus adventuringGearList) ersetzt.
 */
function expandInventoryPacks(items) {
    let flattened = [];

    items.forEach(item => {
        if (item.typeLabel === 'packLabel') {
            if (typeof adventuringGearList !== 'undefined') {
                const packData = adventuringGearList.find(g => g.translationLabel === item.label);

                if (packData && packData.packConent && Array.isArray(packData.packConent)) {
                    packData.packConent.forEach(contentString => {
                        const parsed = parsePackContentString(contentString);
                        flattened.push({
                            // Menge multiplizieren (Pack-Menge * Inhalt-Menge)
                            amount: parsed.amount * (item.amount || 1), 
                            label: parsed.label,
                            selectedVaries: null,
                            typeLabel: 'singleItemLabel' 
                        });
                    });
                } else {
                    flattened.push(item);
                }
            } else {
                flattened.push(item);
            }
        } else {
            flattened.push(item);
        }
    });

    return flattened;
}

/**
 * Hilfsfunktion: Zerlegt "5xrationsLabel" in {amount: 5, label: "rationsLabel"}
 */
function parsePackContentString(str) {
    const match = str.match(/^(\d+)x(.+)$/);
    if (match) {
        return {
            amount: parseInt(match[1], 10),
            label: match[2].trim()
        };
    }
    return {
        amount: 1,
        label: str
    };
}

// --- HELPER: Kapazität berechnen ---
function getCapacityString(itemLabel) {
    if (!itemLabel) return "-";

    if (typeof mountList !== 'undefined') {
        const mount = mountList.find(m => m.translationLabel === itemLabel);
        if (mount && mount.carryingCapacity) {
            const kg = Math.round(mount.carryingCapacity * 0.453592);
            return `${kg} kg`; 
        }
    }

    if (typeof shipList !== 'undefined') {
        const ship = shipList.find(s => s.translationLabel === itemLabel);
        if (ship && ship.cargo) {
            return `${ship.cargo} t`; 
        }
    }

    return "-";
}


// BEREICH: PHYSISCHE ANGRIFFE (LOGIK & RENDERING)

/**
 * Wird aufgerufen, wenn eine Waffe im Inventar "equipped" (angehakt) wird.
 * Liest alle gecheckten Waffen aus und füllt die obere Tabelle.
 */
function updatePhysicalAttacks() {
    const headerEl = document.getElementById('th_amount_1');
    if (!headerEl) return; 

    // 1. DATEN LADEN & AUFBEREITEN (Synchron zur Anzeige!)
    const charData = loadCharacterDataFromStorage(); 
    let processedWeapons = charData.equipment.weapons || [];
    
    // WICHTIG: Dieselben Filter anwenden wie bei der Anzeige
    processedWeapons = expandInventoryPacks(processedWeapons);
    processedWeapons = mergeDuplicateItems(processedWeapons);

    // 2. CHECKBOXEN AUSLESEN
    const weaponRows = headerEl.closest('table').querySelector('tbody').querySelectorAll('tr');
    const equippedWeapons = [];

    weaponRows.forEach(row => {
        const checkbox = row.querySelector('input[type="checkbox"]');
        
        if (checkbox && checkbox.checked) {
            // Wir lesen den Index aus, den wir in processInventory gesetzt haben
            const indexStr = checkbox.getAttribute('data-index');
            
            if (indexStr !== null) {
                const index = parseInt(indexStr, 10);
                
                // Wir holen das Item aus der BEREINIGTEN Liste
                if (processedWeapons[index]) {
                    equippedWeapons.push(processedWeapons[index]);
                }
            }
        }
    });

    // 3. ANGRIFFSTABELLE LEEREN
    const attackHeader = document.getElementById('th_weapon_attack');
    if (!attackHeader) return;
    const attackRows = attackHeader.closest('table').querySelector('tbody').querySelectorAll('tr');

    attackRows.forEach(row => {
        row.querySelectorAll('input').forEach(input => input.value = "");
        row.querySelectorAll('select').forEach(sel => sel.remove());
        row.querySelectorAll('input').forEach(input => input.style.display = 'block');
    });

    // 4. ZEILEN BEFÜLLEN
    // Stats laden
    const pbInput = document.getElementById('proficiencyBonus');
    const pb = pbInput ? (parseInt(pbInput.value.replace('+','')) || 2) : 2;
    const strInput = document.getElementById('strengthModifier');
    const strMod = strInput ? (parseInt(strInput.value) || 0) : 0;
    const dexInput = document.getElementById('dexterityModifier');
    const dexMod = dexInput ? (parseInt(dexInput.value) || 0) : 0;

    equippedWeapons.forEach((item, index) => {
        // Wir haben nur 8 Zeilen für Angriffe
        if (index < attackRows.length) {
            const row = attackRows[index];
            renderAttackRow(row, item, charData, strMod, dexMod, pb);
        }
    });
}

function isProficientWithWeapon(weaponData) {
    if (!weaponData) return false;

    // A. Aktuelle Checkboxen prüfen (Live-Status)
    const category = weaponData.weaponCategoryNumber; // 1=SimpleMelee, 2=SimpleRanged, 3=MartialMelee, 4=MartialRanged
    let isCategoryChecked = false;

    if (category === 1) isCategoryChecked = document.getElementById('simpleMeleeWeapons')?.checked;
    else if (category === 2) isCategoryChecked = document.getElementById('simpleRangedWeapons')?.checked;
    else if (category === 3) isCategoryChecked = document.getElementById('martialMeleeWeapons')?.checked;
    else if (category === 4) isCategoryChecked = document.getElementById('martialRangedWeapons')?.checked;

    // Wenn die Kategorie gar nicht angehakt ist, sind wir sowieso nicht geübt
    if (!isCategoryChecked) return false;

    // B. FEIN-PRÜFUNG: Klassenspezifische Einschränkungen (Properties)
    // Wir laden die internen Daten, um die Klasse sicher zu identifizieren (z.B. "Rogue" statt "Schurke")
    const charData = loadCharacterDataFromStorage();
    const className = charData.basic.class; 

    if (className && typeof classCoreTraitsList !== 'undefined') {
        // Suche case-insensitive nach dem internen Label
        const classData = classCoreTraitsList.find(c => 
            c.translationLabel.toLowerCase() === className.toLowerCase()
        );

        // Hat diese Klasse Einschränkungen bei den Eigenschaften? 
        // (z.B. Rogue hat weaponPropertyCategoryNumber: [2] für Finesse)
        // WICHTIG: Wir prüfen das NUR, wenn es sich um Kriegswaffen (3/4) handelt, 
        // da einfache Waffen (1/2) meist pauschal erlaubt sind.
        if (classData && classData.weaponPropertyCategoryNumber && (category === 3 || category === 4)) {
            
            // Die erlaubten Eigenschaften der Klasse
            const allowedProps = Array.isArray(classData.weaponPropertyCategoryNumber) 
                                 ? classData.weaponPropertyCategoryNumber 
                                 : [classData.weaponPropertyCategoryNumber];

            // Die Eigenschaften der aktuellen Waffe
            const weaponProps = Array.isArray(weaponData.weaponPropertyCategoryNumber)
                                ? weaponData.weaponPropertyCategoryNumber
                                : (weaponData.weaponPropertyCategoryNumber ? [weaponData.weaponPropertyCategoryNumber] : []);

            // SCHNITTMENGE PRÜFEN:
            // Hat die Waffe mindestens EINE Eigenschaft, die in der erlaubten Liste steht?
            // (z.B. Hat das Großschwert "Finesse"? Nein -> false)
            const hasMatchingProperty = weaponProps.some(propId => allowedProps.includes(propId));

            if (!hasMatchingProperty) {
                // Obwohl die Kategorie (Kriegswaffen) angehakt ist, passt die Eigenschaft nicht zur Klasse.
                // Daher: Kein Bonus!
                return false; 
            }
        }
    }

    // Wenn alle Checks bestanden sind:
    return true;
}

/**
 * Berechnet Werte für eine Waffe und schreibt sie in die Zeile.
 */
function renderAttackRow(row, item, charData, strMod, dexMod, pb) {
    const inputs = row.querySelectorAll('input');
    // inputs[0]: Name, [1]: Bonus, [2]: Schaden/Art, [3]: Eigenschaften, [4]: Meisterschaft, [5]: Beschreibung

    // A. STAMMDATEN LADEN
    let weaponData = null;
    if (typeof weaponList !== 'undefined') {
        weaponData = weaponList.find(w => w.translationLabel === item.label);
    }

    // Fallback
    if (!weaponData) {
        inputs[0].value = (translations[currentLanguage] && translations[currentLanguage][item.label]) 
                          ? translations[currentLanguage][item.label] 
                          : item.label; 
        return;
    }

    // B. NAME
    inputs[0].value = (translations[currentLanguage] && translations[currentLanguage][item.label]) 
                      ? translations[currentLanguage][item.label] 
                      : item.label;

    // C. EIGENSCHAFTEN (Properties) & FINESSE CHECK
    let props = [];
    let isFinesse = false;
    let isLight = false; 
    const isRanged = (weaponData.weaponCategoryNumber === 2 || weaponData.weaponCategoryNumber === 4);
    
    if (weaponData.weaponPropertyCategoryNumber) {
        const propIds = Array.isArray(weaponData.weaponPropertyCategoryNumber) 
                        ? weaponData.weaponPropertyCategoryNumber 
                        : [weaponData.weaponPropertyCategoryNumber];
        
        propIds.forEach(id => {
            if (id === 2) isFinesse = true; // ID 2 ist Finesse

            const propObj = weaponProperty.find(p => p.weaponPropertyCategoryNumber === id);
            if (propObj) {
                // Prüfen ob "Leicht"
                if (propObj.translationLabel === 'lightLabel') isLight = true;

                const pName = (translations[currentLanguage] && translations[currentLanguage][propObj.translationLabel]) 
                              ? translations[currentLanguage][propObj.translationLabel] 
                              : propObj.translationLabel;
                props.push(pName);
            }
        });
    }
    inputs[3].value = props.length > 0 ? props.join(", ") : "-";

    // --- KORRIGIERTE MÖNCHS-REGEL ---
    // Gleiche Bedingung wie bei der Berechnung: Kein Fernkampf UND (Leicht ODER Einfache Nahkampfwaffe)
    if (window.hasMartialArts && !isRanged && (isLight || weaponData.weaponCategoryNumber === 1)) {
        isFinesse = true; 
    }


    // D. SCHADEN & SCHADENSART (Basiswerte ermitteln)
    const dmgVal = weaponData.weaponDamageValue || "";
    let dmgType = "";
    if (weaponData.damageCategoryNumber) {
        const typeObj = damageType.find(d => d.damageCategoryNumber === weaponData.damageCategoryNumber);
        if (typeObj) {
            dmgType = (translations[currentLanguage] && translations[currentLanguage][typeObj.translationLabel]) 
                      ? translations[currentLanguage][typeObj.translationLabel] 
                      : typeObj.translationLabel;
            
            dmgType = dmgType.replace("Label", ""); 
        }
    }
    // (Der Wert wird erst in Block F final mit Modifikator in inputs[2] geschrieben)

    // E. MEISTERSCHAFT (Mastery)
    let masteryText = "-"; 
    
    if (charData.classForm && charData.classForm.weaponMastery && Array.isArray(charData.classForm.weaponMastery)) {
        if (charData.classForm.weaponMastery.includes(weaponData.ID.toString())) {
            const masteryObj = weaponMastery.find(m => m.weaponMasteryCategoryNumber === weaponData.weaponMasteryCategoryNumber);
            if (masteryObj) {
                masteryText = (translations[currentLanguage] && translations[currentLanguage][masteryObj.translationLabel]) 
                              ? translations[currentLanguage][masteryObj.translationLabel] 
                              : masteryObj.translationLabel;
            }
        }
    }
    inputs[4].value = masteryText;

    // --- ÜBUNGSPRÜFUNG ---
    const isProficient = isProficientWithWeapon(weaponData);

    // --- ARCHERY BONUS PRÜFUNG (NEU) ---
    let archeryBonus = 0;
    // Kategorie 2 (Einfache Fernkampf) oder 4 (Kriegswaffen Fernkampf)
    if (window.hasArcheryStyle === true) {
        if (weaponData.weaponCategoryNumber === 2 || weaponData.weaponCategoryNumber === 4) {
            archeryBonus = 2;
        }
    }

    // F. BONUS BERECHNUNG & DROPDOWN (Angriff & Schaden)
    const descCell = inputs[5].parentElement; 
    
    if (isFinesse) {
        inputs[5].style.display = 'none'; 
        
        let select = descCell.querySelector('select.finesse-selector');
        if (!select) {
            const t = translations[currentLanguage] || translations['de'];
            const strLabel = t['strengthLabel'] || 'Stärke';
            const dexLabel = t['dexterityLabel'] || 'Geschicklichkeit';
            
            select = document.createElement('select');
            select.className = 'table-input finesse-selector';
            select.style.width = "100%";
            select.style.border = "none";
            select.style.background = "transparent";
            select.innerHTML = `
                <option value="STR">${strLabel}</option>
                <option value="DEX">${dexLabel}</option>
            `;
            
            // Event Listener mit neuem Parameter-Set für Angriff UND Schaden
            select.onchange = function() {
                recalcFinesseBonus(this, inputs[1], inputs[2], strMod, dexMod, pb, isProficient, archeryBonus, dmgVal, dmgType);
            };
            
            descCell.appendChild(select);
            
            if (dexMod > strMod) {
                select.value = "DEX";
            } else {
                select.value = "STR";
            }
        }
        
        // Initialen Bonus berechnen (inkl. Archery)
        recalcFinesseBonus(select, inputs[1], inputs[2], strMod, dexMod, pb, isProficient, archeryBonus, dmgVal, dmgType);
        
    } else {
        // Standard Waffe (Kein Finesse)
        inputs[5].style.display = 'block';
        inputs[5].value = "-";
        
        const oldSelect = descCell.querySelector('select');
        if (oldSelect) oldSelect.remove();

        const bestMod = calculateBestWeaponMod(weaponData, strMod, dexMod);
        
        // 1. Angriffsbonus (Mod + PB (wenn geübt) + ArcheryBonus)
        const totalAttack = (isProficient ? (bestMod + pb) : bestMod) + archeryBonus;
        inputs[1].value = (totalAttack >= 0 ? "+" : "") + totalAttack;

        // 2. Schaden zusammensetzen (Nur Mod)
        if (dmgVal) {
            let modString = "";
            const isDiceRoll = dmgVal.toLowerCase().includes('d'); // Check für Blasrohr etc.

            if (isDiceRoll) {
                if (bestMod > 0) modString = `+${bestMod}`;
                else if (bestMod < 0) modString = `${bestMod}`;
                // Bei bestMod === 0 bleibt modString "", es wird keine +0 geschrieben
            }
            
            inputs[2].value = `${dmgVal} ${modString} ${dmgType}`.trim().replace(/\s+/g, ' ');
        } else {
            inputs[2].value = "-";
        }
    }
}

/**
 * Berechnet Bonus neu basierend auf Dropdown Auswahl
 */
function recalcFinesseBonus(selectElem, bonusInputElem, dmgInputElem, strMod, dexMod, pb, isProficient, archeryBonus = 0, baseDmg = "", dmgType = "") {
    const selected = selectElem.value;
    const mod = (selected === 'DEX') ? dexMod : strMod;
    
    // 1. Angriffsbonus (Mod + PB + Archery)
    const totalAttack = (isProficient ? (mod + pb) : mod) + archeryBonus;
    bonusInputElem.value = (totalAttack >= 0 ? "+" : "") + totalAttack;

    // 2. Schadensbonus (Nur Mod, KEIN Archery, KEIN PB)
    if (baseDmg) {
        let modString = "";
        if (mod > 0) modString = `+${mod}`;
        else if (mod < 0) modString = `${mod}`; // Minus ist schon im Wert
        
        // Baut z.B. "1d4 +3 Hieb" oder "1d4 -1 Hieb" oder "1d4 Hieb" (bei 0)
        dmgInputElem.value = `${baseDmg} ${modString} ${dmgType}`.trim().replace(/\s+/g, ' '); 
    } else {
        dmgInputElem.value = "-";
    }
}

/* ==========================================================================
   BEREICH: RÜSTUNGSKLASSE (AC)
   ========================================================================== */

/**
 * Berechnet die Rüstungsklasse basierend auf der ausgerüsteten Rüstung und dem Schild.
 * Aktualisiert auch Labels auf Seite 1 und den Sperr-Status.
 */
function updateArmorClass() {
    // 1. Stats holen
    const dexMod = parseInt(document.getElementById('dexterityModifier').value) || 0;
    
    let finalAC = 10 + dexMod; // Basis (Unarmored)

    // Prüfen, ob wir einen besseren Basiswert durch ein Klassenmerkmal haben
    if (typeof window.classFeatureAC !== 'undefined' && window.classFeatureAC > finalAC) {
        finalAC = window.classFeatureAC; 
    }

    let equippedArmorName = ""; 
    let shieldAvailableInInventory = false; 

    // 2. Inventar (Box 2) prüfen
    const headerEl = document.getElementById('th_amount_2');
    if (headerEl) {
        const rows = headerEl.closest('table').querySelector('tbody').querySelectorAll('tr');
        
        // Daten für Lookup holen
        const charData = loadCharacterDataFromStorage();
        let processedArmor = charData.equipment.armor || [];
        processedArmor = expandInventoryPacks(processedArmor);
        processedArmor = mergeDuplicateItems(processedArmor);

        for (let row of rows) {
            const checkbox = row.querySelector('input[type="checkbox"]');
            
            // Check: Ist das ein Schild?
            if (checkbox && checkbox.classList.contains('inventory-shield-checkbox')) {
                shieldAvailableInInventory = true;
            }

            // Check: Ist diese Rüstung angelegt?
            if (checkbox && checkbox.checked) {
                const index = parseInt(checkbox.getAttribute('data-index'), 10);
                const item = processedArmor[index];

                if (item && typeof armorList !== 'undefined') {
                    const armorData = armorList.find(a => a.translationLabel === item.label);
                    
                    // RÜSTUNG (Kein Schild)
                    if (armorData && armorData.armorCategoryNumber !== 4) {
                        
                        // Basis AC der Rüstung
                        const baseVal = parseInt(armorData.armorClassValue) || 10;
                        let modVal = 0;

                        // --- MODIFIKATOR BERECHNUNG ---
                        if (armorData.armorClassMod === 'dexMod') {
                            
                            // Standardmäßig nehmen wir den vollen DexMod
                            let applicableDexMod = dexMod;
                            const catNum = armorData.armorCategoryNumber;

                            // KATEGORIE 2: MITTELSCHWERE RÜSTUNG (Medium Armor)
                            if (catNum === 2) {
                                let maxDex = 2; // Standard-Cap: +2

                                // Talent-Check: "Medium Armor Master"
                                // Bedingung: Talent aktiv UND GE-Wert >= 16
                                const dexScore = parseInt(document.getElementById('dexterityScore').value) || 10;
                                
                                if (window.hasMediumArmorMaster === true && dexScore >= 16) {
                                    maxDex = 3; // Erhöhtes Cap
                                }

                                // Cap anwenden
                                if (applicableDexMod > maxDex) {
                                    applicableDexMod = maxDex;
                                }
                            }
                            // KATEGORIE 3: SCHWERE RÜSTUNG (Heavy Armor)
                            else if (catNum === 3) {
                                applicableDexMod = 0; // Kein Dex-Bonus
                            }
                            // KATEGORIE 1: LEICHTE RÜSTUNG
                            // Kein Cap (applicableDexMod bleibt unverändert)

                            modVal = applicableDexMod;
                        }

                        finalAC = baseVal + modVal;

                        // --- KAMPFSTIL VERTEIDIGUNG (DEFENSE) ---
                        // Bedingung: Rüstung getragen (sind wir hier im Block) UND Talent vorhanden
                        if (window.hasDefenseStyle === true) {
                            finalAC += 1;
                        }
                        
                        // --- Short Label Logik ---
                        if (armorData.translationShortLabel && armorData.translationShortLabel !== 0) {
                            equippedArmorName = (translations[currentLanguage] && translations[currentLanguage][armorData.translationShortLabel]) 
                                                ? translations[currentLanguage][armorData.translationShortLabel] 
                                                : armorData.translationShortLabel;
                        } else {
                            equippedArmorName = (translations[currentLanguage] && translations[currentLanguage][item.label]) 
                                                ? translations[currentLanguage][item.label] 
                                                : item.label;
                        }
                    }
                }
            }
        }
    }

    // 3. Schild-Logik auf Seite 1
    const shieldCheckboxPage1 = document.getElementById('shieldActive');
    
    if (shieldCheckboxPage1) {
        if (shieldAvailableInInventory) {
            shieldCheckboxPage1.disabled = false;
            if (shieldCheckboxPage1.checked) {
                finalAC += 2;
            }
        } else {
            shieldCheckboxPage1.checked = false;
            shieldCheckboxPage1.disabled = true;
        }
    }

    // 4. Werte schreiben
    const acInput = document.getElementById('armorClass');
    if (acInput) acInput.value = finalAC;

    const armorNameInput = document.getElementById('equippedArmor');
    if (armorNameInput) armorNameInput.value = equippedArmorName;

    // 5. Locking aktualisieren
    updateArmorLocking();
}

/**
 * Synchronisiert die Schild-Checkboxen zwischen Seite 1 und Inventar.
 * @param {HTMLElement} element - Das angeklickte Element
 * @param {string} source - 'page1' oder 'inventory'
 */
function toggleShield(element, source) {
    const isChecked = element.checked;
    
    // 1. Referenzen holen
    const page1Checkbox = document.getElementById('shieldActive');
    
    // Inventory Checkbox suchen (Markiert mit Klasse 'inventory-shield-checkbox')
    // Achtung: Es könnte theoretisch mehrere Schilde im Inventar geben. Wir nehmen alle.
    const inventoryShields = document.querySelectorAll('.inventory-shield-checkbox');

    // 2. Synchronisieren
    if (source === 'page1') {
        // Seite 1 geklickt -> Inventar updaten
        inventoryShields.forEach(cb => cb.checked = isChecked);
    } else {
        // Inventar geklickt -> Seite 1 updaten
        if (page1Checkbox) page1Checkbox.checked = isChecked;
        
        // Auch alle anderen Schilde im Inventar gleichschalten (wenn man 2 hat)
        inventoryShields.forEach(cb => cb.checked = isChecked);
    }

    // 3. AC neu berechnen
    updateArmorClass();

    // Damit Mönch/Barbar sofort merken, dass ein Schild getragen wird
    const charData = loadCharacterDataFromStorage();
    applyClassFeatureLogic(charData);
    applyTalentFeatureLogic(charData);
}

/**
 * Sorgt dafür, dass nur EINE Rüstung gleichzeitig ausgewählt sein kann.
 * Schilde sind davon ausgenommen (können zusätzlich gewählt werden).
 */
function updateArmorLocking() {
    const headerEl = document.getElementById('th_amount_2'); // Rüstungs-Tabelle
    if (!headerEl) return;

    const rows = headerEl.closest('table').querySelector('tbody').querySelectorAll('tr');
    
    let isBodyArmorEquipped = false;
    let equippedRowIndex = -1;

    // 1. Prüfen: Ist aktuell eine Körperrüstung (kein Schild) angelegt?
    rows.forEach((row, index) => {
        const checkbox = row.querySelector('input[type="checkbox"]');
        // Wir erkennen Schilde an der Klasse, die wir in processInventory gesetzt haben
        const isShield = checkbox && checkbox.classList.contains('inventory-shield-checkbox');
        
        if (checkbox && checkbox.checked && !isShield) {
            isBodyArmorEquipped = true;
            equippedRowIndex = index;
        }
    });

    // 2. Sperren/Entsperren
    rows.forEach((row, index) => {
        const checkbox = row.querySelector('input[type="checkbox"]');
        const isShield = checkbox && checkbox.classList.contains('inventory-shield-checkbox');

        // Schilde werden hiervon nicht beeinflusst (eigene Logik via toggleShield)
        if (checkbox && !isShield) {
            if (isBodyArmorEquipped && index !== equippedRowIndex) {
                // Eine andere Rüstung ist an -> diese hier sperren
                checkbox.disabled = true;
                row.classList.add('disabled-inventory-row');
            } else {
                // Keine Rüstung an ODER dies ist die angelegte Rüstung -> freigeben
                // (Wichtig: Nur freigeben, wenn wir im EditMode sind oder es generell erlaubt ist.
                // Da Inventory-Checkboxen in BoxConfig 'checkbox' sind, sind sie per default klickbar)
                checkbox.disabled = false;
                row.classList.remove('disabled-inventory-row');
            }
        }
    });
}


/* --------------------------------------------------------------------------
   3 f. Klassenmerkmale
   -------------------------------------------------------------------------- */
function processClassFeatures(data) {
    console.log("Verarbeite Klassenmerkmale...");
    
    // 1. Level & Klasse ermitteln
    const levelInput = document.getElementById('level');
    let currentLevel = levelInput ? parseInt(levelInput.value, 10) : parseInt(data.basic.level, 10);
    if (isNaN(currentLevel)) currentLevel = 1;

    // 2. Datenquelle sicher laden
    const className = data.basic.class; 
    const dataSource = getClassDataArray(className); 

    if (!dataSource) {
        console.warn(`Keine Klassendaten gefunden für: ${className}`);
        return;
    }

    // 3. Unterklasse & Container
    const subclassId = parseInt(data.classForm.subclass, 10) || 0;
    const classBox = document.getElementById('classFeaturesContent');
    const subClassBox = document.getElementById('subclassFeaturesContent');
    
    if (classBox) classBox.innerHTML = "";
    if (subClassBox) subClassBox.innerHTML = "";

    // 4. Rendering starten
    renderFeatures(dataSource, currentLevel, subclassId, data, className);
}

function renderFeatures(dataSource, currentLevel, userSubclassId, data, className) {
    let classFeaturesMap = new Map();
    let subclassFeaturesMap = new Map();

    const sortedData = [...dataSource].sort((a, b) => a.level - b.level);

    // --- UI LABELS LADEN ---
    const t = translations[currentLanguage] || translations['de'];
    const lblLevel = t['levelLabel2'] || "Stufe"; 
    const lblExpansion = t['expansionAtLevelLabel'] || "Erweiterung auf Stufe";

    sortedData.forEach(feat => {
        // Filter: Level-Check
        if (feat.level > currentLevel) return;

        // Filter: Ist es ein Klassen- oder Unterklassen-Feature?
        const isClassFeature = (feat.subclassCategoryNumber === 0);
        const isSubclassFeature = (feat.subclassCategoryNumber === userSubclassId);
        if (!isClassFeature && !isSubclassFeature) return;

        // Filter: Nur Typ 1 (Text) und 3 (Auswahl) anzeigen
        const configStr = (feat.classFeaturesCharacterSheet || "0").toString();
        const configParts = configStr.split(':');
        const type = configParts[0]; 
        const mode = configParts[1] || "";
        const target = configParts[2] || "";

        if (type !== "1" && type !== "3") return;

        // --- TEXT LADEN (STRATEGIE: EXPLIZITER KEY VOR KONSTRUKTION) ---
        let rawText = "";
        let lookupKey = "";

        // SCHRITT 1: Prüfen, ob in den Daten ein expliziter Key steht (z.B. "fightingStyleD")
        // Das ist der Standard für Fighter, Cleric etc.
        if (feat.classFeatureDescription && feat.classFeatureDescription !== 0 && feat.classFeatureDescription !== "0") {
            lookupKey = feat.classFeatureDescription;
        } 
        // SCHRITT 2: Fallback für alte Daten (z.B. Barbar), falls Feld fehlt
        else if (feat.translationLabel) {
            lookupKey = feat.translationLabel + 'D';
        }

        // SCHRITT 3: Übersetzung abrufen
        if (lookupKey && translations[currentLanguage] && translations[currentLanguage][lookupKey]) {
            rawText = translations[currentLanguage][lookupKey];
        }

        // Falls kein Text gefunden wurde -> Abbrechen (oder Debugging)
        if (!rawText) {
            // console.warn("Keine Übersetzung gefunden für Key:", lookupKey);
            return;
        }

        // --- PARSING & TITEL ---
        const parsedText = parseFeatureText(rawText, data, currentLevel, className, dataSource);
        
        // Titel laden (Hier ist translationLabel immer der korrekte Key)
        let title = (translations[currentLanguage] && translations[currentLanguage][feat.translationLabel]) 
                      ? translations[currentLanguage][feat.translationLabel] 
                      : feat.translationLabel;

        // --- AUTO-MARKER (Zahnrad) ---
        // Wir prüfen, ob der Typ "3" ist (Automatisch berechnet)
        const autoText = t['autoValueText'] || "Dieser Wert wird automatisch berechnet";
        if (type === "3") {
            title += `<span class="auto-marker" title="${autoText}">⚙</span>`;
        }

        const targetMap = isClassFeature ? classFeaturesMap : subclassFeaturesMap;

        // --- HTML RENDERING ---
        if (mode === "APPEND" && target && targetMap.has(target)) {
            // APPEND: Zusatzinfo an bestehenden Block anhängen
            let existingEntry = targetMap.get(target);
            existingEntry.html += `<div class="feature-append"><div class="feature-append-header">(${lblExpansion} ${feat.level})</div><div class="feature-text">${parsedText}</div></div>`;
            targetMap.set(target, existingEntry);
        } else {
            // HAUPT-ITEM
            const htmlBlock = `<div class="feature-block"><div class="feature-header"><span class="feature-title">${title}</span><span class="feature-level">${lblLevel} ${feat.level}</span></div><div class="feature-text">${parsedText}</div></div>`;
            targetMap.set(feat.translationLabel, { level: feat.level, html: htmlBlock });
        }
    });

    // --- DOM UPDATES ---
    if (document.getElementById('classFeaturesContent')) {
        let html = "";
        classFeaturesMap.forEach(val => html += val.html);
        document.getElementById('classFeaturesContent').innerHTML = html;
    }
    if (document.getElementById('subclassFeaturesContent')) {
        let html = "";
        subclassFeaturesMap.forEach(val => html += val.html);
        document.getElementById('subclassFeaturesContent').innerHTML = html;
    }
}

/* --------------------------------------------------------------------------
   HELPER FUNKTIONEN FÜR KLASSENMERKMALE
   -------------------------------------------------------------------------- */

// MAPPING: Welches Formularfeld gehört zu welcher globalen Liste?
const FIELD_TO_LIST_MAP = {
    'lands': 'landCategoryList',                   
    'elementalFuries': 'elementalFuryCategoryList', 
    'primalOrders': 'primalOrderCategoryList',      
    'divineOrders': 'divineOrderCategoryList',      
    'blessedStrikes': 'blessedStrikesCategoryList', 
    'damageType_Dragon': 'damageType_All',
    'damageType_fiendRes': 'damageType_All',                             
    'subclass': 'subclassList',
    'attributes': 'attributeList'                 
};

// MAPPING: Welches Feld gehört zu welcher globalen Liste (für [CHOICE_LIST])?
const CHOICE_LIST_MAP = {
    'expertise': 'skillList',
    'maneuvers': 'maneuverCategoryList',            // Kämpfer
    'metamagics': 'metamagicOptionsList',            // Zauberer
    'eldritchInvocations': 'eldritchInvocationOptionsList'  // Hexenmeister
};

// 1. Grundfunktion: Pfad im Objekt finden
function getValueByPath(obj, path) {
    if (!path || !obj) return undefined;
    const keys = path.split('.');
    let current = obj;
    for (let i = 0; i < keys.length; i++) {
        if (current === undefined || current === null) return undefined;
        current = current[keys[i]];
    }
    return current;
}

// 2. Parser
function parseFeatureText(text, data, level, className, dataSource) {
    if (!text) return "";
    
    // Level-Werte
    text = text.replace(/\[LEVEL_VAL\](.*?)\[\/LEVEL_VAL\]/g, (m, k) => getDynamicLevelValue(k.trim(), level, dataSource));
    
    // Einfache Auswahl
    text = text.replace(/\[CHOICE\](.*?)\[\/CHOICE\]/g, (m, k) => getSingleChoiceName(k.trim(), data, className));
    
    // Listen von Auswahlen
    text = text.replace(/\[CHOICE_LIST\](.*?)\[\/CHOICE_LIST\]/g, (m, k) => getChoiceListHTML(k.trim(), data));

    // Komplexer Daten-Lookup
    text = text.replace(/\[DATA\](.*?)\[\/DATA\]/g, (m, k) => getDataLookupValue(k.trim(), data));
    
    // Waffen-Meisterschaften
    text = text.replace(/\[MASTERY_LIST\](.*?)\[\/MASTERY_LIST\]/g, (m, k) => getWeaponMasteryListHTML(k.trim(), data));

    // Beschwörungen (Summon)
    text = text.replace(/\[SUMMON\](.*?)\[\/SUMMON\]/g, (m, k) => getSummonName(k.trim()));
    
    return text;
}

// 3. Helper Listen (Alle globalen Listen zentral abrufen)
function getListByName(listName) {
    const map = {
        // Druide
        'landCategoryList': (typeof landCategoryList !== 'undefined') ? landCategoryList : null,
        'elementalFuryCategoryList': (typeof elementalFuryCategoryList !== 'undefined') ? elementalFuryCategoryList : null,
        'primalOrderCategoryList': (typeof primalOrderCategoryList !== 'undefined') ? primalOrderCategoryList : null,
        
        // Kleriker
        'divineOrderCategoryList': (typeof divineOrderCategoryList !== 'undefined') ? divineOrderCategoryList : null,
        'blessedStrikesCategoryList': (typeof blessedStrikesCategoryList !== 'undefined') ? blessedStrikesCategoryList : null,

        // Zauberer / Hexenmeister
        'damageType_All': (typeof damageType_All !== 'undefined') ? damageType_All : null,
        
        // Listen für [CHOICE_LIST]
        'skillList': (typeof skillList !== 'undefined') ? skillList : null,
        'maneuverCategoryList': (typeof maneuverCategoryList !== 'undefined') ? maneuverCategoryList : null,
        'metamagicOptionsList': (typeof metamagicOptionsList !== 'undefined') ? metamagicOptionsList : null,
        'eldritchInvocationOptionsList': (typeof eldritchInvocationOptionsList !== 'undefined') ? eldritchInvocationOptionsList : null,
        
        // Unterklassen
        'subclassListBarbarian': (typeof subclassListBarbarian !== 'undefined') ? subclassListBarbarian : null,
        'subclassListBard': (typeof subclassListBard !== 'undefined') ? subclassListBard : null,
        'subclassListCleric': (typeof subclassListCleric !== 'undefined') ? subclassListCleric : null,
        'subclassListDruid': (typeof subclassListDruid !== 'undefined') ? subclassListDruid : null,
        'subclassListFighter': (typeof subclassListFighter !== 'undefined') ? subclassListFighter : null,
        'subclassListMonk': (typeof subclassListMonk !== 'undefined') ? subclassListMonk : null,
        'subclassListPaladin': (typeof paladinClassData !== 'undefined') ? paladinClassData : null, 
        'subclassListRanger': (typeof subclassListRanger !== 'undefined') ? subclassListRanger : null,
        'subclassListRogue': (typeof subclassListRogue !== 'undefined') ? subclassListRogue : null,
        'subclassListSorcerer': (typeof subclassListSorcerer !== 'undefined') ? subclassListSorcerer : null,
        'subclassListWarlock': (typeof subclassListWarlock !== 'undefined') ? subclassListWarlock : null,
        'subclassListWizard': (typeof subclassListWizard !== 'undefined') ? subclassListWizard : null
    };
    return map[listName];
}

// 4. Intelligente Namensauflösung (Repariert: Nutzt getListByName)
function getSingleChoiceName(keyPath, globalData, className) {
    let val = getValueByPath(globalData, keyPath);
    
    // Sicherheitscheck: undefined/null/empty -> "-"
    if (val === undefined || val === null || val === "") return "-";

    // Wenn es KEINE Zahl ist, ist es Text -> Übersetzen
    if (isNaN(val)) {
        return (translations[currentLanguage] && translations[currentLanguage][val]) ? translations[currentLanguage][val] : val;
    }

    // Pfad zerlegen, um Feldnamen zu finden
    const pathParts = keyPath.split('.');
    const fieldName = pathParts[pathParts.length - 1]; // z.B. "lands" oder "elementalFuries"
    
    let listName = FIELD_TO_LIST_MAP[fieldName];

    // Spezialfall: Unterklassen
    if (fieldName === 'subclass' && className) {
        const capClass = className.charAt(0).toUpperCase() + className.slice(1).toLowerCase().trim();
        listName = `subclassList${capClass}`;
    }

    // Liste holen (Das hatte ich im letzten Versuch falsch gemacht)
    const list = getListByName(listName);

    if (list && Array.isArray(list)) {
        // ID suchen (String vs Number sicherstellen)
        const foundItem = list.find(item => item.id == val || Object.values(item).includes(parseInt(val)));
        
        if (foundItem) {
            let labelKey = foundItem.translationLabel || foundItem.label;

            // Fallback Suche nach Keys mit 'Label'
            if (!labelKey) {
                const potentialKey = Object.keys(foundItem).find(k => k.toLowerCase().includes('label') && !k.includes('DLabel')); 
                if (potentialKey) labelKey = foundItem[potentialKey];
            }

            // Übersetzen
            if (labelKey && translations[currentLanguage] && translations[currentLanguage][labelKey]) {
                return translations[currentLanguage][labelKey];
            }
            return labelKey || val; 
        }
    }

    return val; 
}

// 5. Gezielter Daten-Abruf (Repariert: Nutzt getListByName)
function getDataLookupValue(keyString, globalData) {
    const parts = keyString.split(':');
    const savedId = getValueByPath(globalData, parts[0]);
    
    if (savedId === undefined || savedId === null || savedId === "") return "-";
    if (parts.length < 3) return savedId; 

    const listName = parts[1].trim();     
    const targetProp = parts[2].trim();    

    // Liste holen
    const list = getListByName(listName);

    if (!list || !Array.isArray(list)) return "-";

    // Item suchen
    const foundItem = list.find(item => item.id == savedId || Object.values(item).includes(parseInt(savedId)));
    if (!foundItem) return "-";

    let resultValue = foundItem[targetProp];

    // Übersetzen wenn der Wert selbst ein Key ist
    if (resultValue && typeof resultValue === 'string') {
        if (translations[currentLanguage] && translations[currentLanguage][resultValue]) {
            return translations[currentLanguage][resultValue];
        }
    }

    return resultValue !== undefined ? resultValue : "-";
}

// 6. Generische Listen-Anzeige (Für Manöver etc.)
function getChoiceListHTML(keyPath, data) {
    let val = getValueByPath(data, keyPath);
    if (!val || !Array.isArray(val) || val.length === 0) return "<i>Keine.</i>";

    const pathParts = keyPath.split('.');
    const fieldName = pathParts[pathParts.length - 1]; 
    const listName = CHOICE_LIST_MAP[fieldName];
    
    const list = getListByName(listName);
    if (!list) return "-";

    let html = "<ul class='compact-list'>";
    
    val.forEach(savedId => {
        const idInt = parseInt(savedId, 10);
        // Robuste Suche (id oder irgendein Value)
        const item = list.find(obj => obj.id == idInt || Object.values(obj).includes(idInt));
        
        if (item) {
            const labelKey = item.translationLabel || item.label;
            const title = (translations[currentLanguage] && translations[currentLanguage][labelKey]) 
                          ? translations[currentLanguage][labelKey] 
                          : labelKey;
            
            // Beschreibung suchen
            let descKey = item.maneuverDLabel || item.metamagicOptionD || item.eldritchInvocationOptionD;
            
            if (!descKey && labelKey) {
                if (translations[currentLanguage] && translations[currentLanguage][labelKey + "D"]) {
                    descKey = labelKey + "D";
                }
            }
            
            const desc = (translations[currentLanguage] && translations[currentLanguage][descKey]) 
                         ? translations[currentLanguage][descKey] 
                         : "";

            if (desc) {
                 html += `<li><b>${title}:</b> ${desc}</li>`;
            } else {
                 html += `<li><b>${title}</b></li>`;
            }
        }
    });

    return html + "</ul>";
}

// 7. Waffen-Meisterschaften
function getWeaponMasteryListHTML(keyPath, data) {
    let val = getValueByPath(data, keyPath);

    if (!val || !Array.isArray(val)) return "<i>Keine.</i>";
    if (typeof weaponList === 'undefined' || typeof weaponMastery === 'undefined') return "-";

    const uniqueIds = new Set();
    let html = "<ul class='compact-list'>";
    
    val.forEach(wId => {
        const w = weaponList.find(x => x.ID === parseInt(wId));
        if (w && w.weaponMasteryCategoryNumber && !uniqueIds.has(w.weaponMasteryCategoryNumber)) {
            uniqueIds.add(w.weaponMasteryCategoryNumber);
            const m = weaponMastery.find(x => x.weaponMasteryCategoryNumber === w.weaponMasteryCategoryNumber);
            if (m) {
                const t = (translations[currentLanguage] && translations[currentLanguage][m.translationLabel]) 
                          ? translations[currentLanguage][m.translationLabel] 
                          : m.translationLabel;
                
                const descKey = m.weaponMasteryDLabel || (m.translationLabel + "D");
                const d = (translations[currentLanguage] && translations[currentLanguage][descKey]) 
                          ? translations[currentLanguage][descKey] 
                          : "";
                
                html += `<li><b>${t}:</b> ${d}</li>`;
            }
        }
    });
    return html + "</ul>";
}

// 8. Dynamische Level-Werte
function getDynamicLevelValue(key, level, dataSource) {
    if (!dataSource || !Array.isArray(dataSource)) return "-";
    const lvl = parseInt(level, 10) || 1;
    const row = dataSource.find(r => r.level === lvl);
    if (!row) return "-";
    const val = row[key];
    if (val !== undefined && val !== null) {
        return val;
    }
    return "-";
}

// 9. Class Data Array Mapping
function getClassDataArray(className) {
    if (!className) return null;
    const c = className.toLowerCase().trim();
    const map = {
        'barbarian': (typeof barbarianClassData !== 'undefined') ? barbarianClassData : null,
        'bard': (typeof bardClassData !== 'undefined') ? bardClassData : null,
        'cleric': (typeof clericClassData !== 'undefined') ? clericClassData : null,
        'druid': (typeof druidClassData !== 'undefined') ? druidClassData : null,
        'fighter': (typeof fighterClassData !== 'undefined') ? fighterClassData : null,
        'monk': (typeof monkClassData !== 'undefined') ? monkClassData : null,
        'paladin': (typeof paladinClassData !== 'undefined') ? paladinClassData : null,
        'ranger': (typeof rangerClassData !== 'undefined') ? rangerClassData : null,
        'rogue': (typeof rogueClassData !== 'undefined') ? rogueClassData : null,
        'sorcerer': (typeof sorcererClassData !== 'undefined') ? sorcererClassData : null,
        'warlock': (typeof warlockClassData !== 'undefined') ? warlockClassData : null,
        'wizard': (typeof wizardClassData !== 'undefined') ? wizardClassData : null
    };
    return map[c];
}

// 10. Beschwörungs-Namen auflösen (Einfache Übersetzung)
function getSummonName(key) {
    // Der Key im Text ist z.B. "beastOfTheLand", das Label ist "beastOfTheLandLabel"
    const labelKey = key + "Label";
    let text = key;

    // Übersetzung suchen
    if (translations[currentLanguage] && translations[currentLanguage][labelKey]) {
        text = translations[currentLanguage][labelKey];
    }

    // Formatierung: Punkt + Fett
    return `• <b>${text}</b>`;
}

/* --- Merkmale mit Einfluss auf Werte --- */

function applyClassFeatureLogic(charData) {
    const levelInput = document.getElementById('level');
    const currentLevel = levelInput ? parseInt(levelInput.value, 10) : 1;

    // Aktuelle Unterklassen-ID aus dem charData Objekt holen
    const userSubclassId = charData.classForm && charData.classForm.subclass 
                           ? parseInt(charData.classForm.subclass, 10) 
                           : 0;

    window.classFeatureAC = 0; 
    window.activeExpertiseIDs = [];
    window.speedBonusClass = 0;
    window.hasMartialArts = false;

    // Basis-Speed (Spezies)
    let baseSpeedFT = 30;
    const searchTerm = (charData.basic.species || "").toLowerCase() + "Label";
    if (typeof speciesList !== 'undefined') {
        const sData = speciesList.find(s => s.translationLabel === searchTerm);
        if (sData) baseSpeedFT = sData.speedFT;
    }

    let computedStats = {
        strength: parseInt(document.getElementById('strengthScore').value) || 10,
        dexterity: parseInt(document.getElementById('dexterityScore').value) || 10,
        constitution: parseInt(document.getElementById('constitutionScore').value) || 10,
        intelligence: parseInt(document.getElementById('intelligenceScore').value) || 10,
        wisdom: parseInt(document.getElementById('wisdomScore').value) || 10,
        charisma: parseInt(document.getElementById('charismaScore').value) || 10,
        computedAC: 0,
        expertiseSkillIDs: [],
        additionalProficiencies: { armor: [], weapon: [] },
        additionalLanguages: [],
        bonusSpeedFT: 0 
    };

    const className = charData.basic.class; 
    const dataSource = getClassDataArray(className); 

    if (dataSource) {
        dataSource.forEach(feat => {
            // --- DER FILTER-BLOCK ---
            // 1. Level-Check
            if (feat.level > currentLevel) return;

            // 2. Unterklassen-Check
            // subclassCategoryNumber 0 bedeutet Basisklasse (alle bekommen es)
            // Wenn > 0, muss es exakt mit der Wahl des Users übereinstimmen
            const isBaseClassFeat = (feat.subclassCategoryNumber === 0 || !feat.subclassCategoryNumber);
            const isMySubclassFeat = (feat.subclassCategoryNumber === userSubclassId);

            if (isBaseClassFeat || isMySubclassFeat) {
                if (typeof featureHandlers !== 'undefined' && featureHandlers[feat.translationLabel]) {
                    charData.basic.level = currentLevel; 
                    featureHandlers[feat.translationLabel](charData, computedStats);
                }
            }
        });
    }

    // Speed - Wert global speichern
    window.speedBonusClass = computedStats.bonusSpeedFT;

    // Sprachen global speichern
    window.additionalClassLanguages = computedStats.additionalLanguages || [];

    if (computedStats.computedAC > 0) window.classFeatureAC = computedStats.computedAC;
    window.activeExpertiseIDs = computedStats.expertiseSkillIDs;

    if (computedStats.additionalProficiencies.armor.length > 0) setProficiencies(computedStats.additionalProficiencies.armor, 'armor');
    if (computedStats.additionalProficiencies.weapon.length > 0) setProficiencies(computedStats.additionalProficiencies.weapon, 'weapon');

    calculateFinalSpeed();
    updateArmorClass();  
    updateSkillValues(); 
}

/* --------------------------------------------------------------------------
   3 g. Talente
   -------------------------------------------------------------------------- */
function processFeats(data) {
    console.log("Verarbeite Talente...");

    const tGlobal = translations[currentLanguage] || {};
    const autoText = tGlobal['autoValueText'] || "Dieser Wert wird automatisch berechnet";

    const featsContainer = document.getElementById('featsContent');
    if (!featsContainer) return;
    featsContainer.innerHTML = ""; // Container leeren

    // 1. Alle Talent-IDs sammeln (Reihenfolge: Hintergrund -> Spezies -> Klasse)
    const collectedFeatIDs = new Set();
    const orderedFeats = [];

    // A. Hintergrund
    if (data.feats.background) {
        if (!collectedFeatIDs.has(data.feats.background)) {
            collectedFeatIDs.add(data.feats.background);
            orderedFeats.push({ id: data.feats.background, source: 'background' });
        }
    }

    // B. Spezies
    if (data.feats.species) {
        if (!collectedFeatIDs.has(data.feats.species)) {
            collectedFeatIDs.add(data.feats.species);
            orderedFeats.push({ id: data.feats.species, source: 'species' });
        }
    }

    // C. Klasse
    if (data.classForm && data.classForm.feats && Array.isArray(data.classForm.feats)) {
        data.classForm.feats.forEach(item => {
            const fId = parseInt(item.feat, 10);
            if (fId && !collectedFeatIDs.has(fId)) {
                collectedFeatIDs.add(fId);
                orderedFeats.push({ id: fId, source: 'class' });
            }
        });
    }

    // 2. Checks für erweiterte Syntax (EXPERT_CHECK, MASTERY_CHECK) vorbereiten
    const className = data.basic.class;
    const currentLevel = parseInt(data.basic.level, 10) || 1;
    const subclassId = parseInt(data.classForm.subclass, 10) || 0;
    
    // Klassendaten laden
    const classDataSource = getClassDataArray(className); 
    
    let classHasExpertise = false;
    let classHasMastery = false;

    if (classDataSource) {
        classDataSource.forEach(feature => {
            // Filter: Level & Subklasse
            if (feature.level > currentLevel) return;
            const isBase = (feature.subclassCategoryNumber === 0 || !feature.subclassCategoryNumber);
            const isSub = (feature.subclassCategoryNumber === subclassId);
            
            if (isBase || isSub) {
                if (feature.classFeatureDescription === "expertiseD" || feature.classFeatureDescription === "expertiseDLabel") {
                    classHasExpertise = true;
                }
                if (feature.classFeatureDescription === "weaponMasteryD" || feature.classFeatureDescription === "weaponMasteryDLabel") {
                    classHasMastery = true;
                }
            }
        });
    }

    let appendExpertiseList = false;
    let htmlContent = "";

    // 3. Rendering-Schleife
    orderedFeats.forEach(item => {
        const featData = featList.find(f => f.ID === item.id);
        if (!featData) return;

        let status = featData.characterSheet; 
        let showDescription = false;

        // Erweiterte Syntax parsen
        if (typeof status === 'string' && status.includes(':')) {
            const parts = status.split(':');
            const baseStatus = parseInt(parts[0], 10);
            const operator = parts[1];

            if (operator === "EXPERT_CHECK") {
                if (classHasExpertise) {
                    status = baseStatus;
                } else {
                    status = baseStatus;
                    appendExpertiseList = true; 
                }
            } 
            else if (operator === "MASTERY_CHECK") {
                if (classHasMastery) {
                    status = 0; // Verstecken, da Klasse es schon zeigt
                } else {
                    status = baseStatus;
                }
            }
        }

        // Status 1 und 3 bedeuten: Beschreibung anzeigen
        if (status === 1 || status === 3) {
            showDescription = true;
        }

        if (showDescription) {
            const t = translations[currentLanguage];
            let title = t[featData.translationLabel] || featData.translationLabel;
            
            // --- NEU: AUTO-MARKER (Zahnrad) ---
            // Wir prüfen direkt auf den Originalwert in der Datenbank, 
            // da die Variable 'status' oben evtl. verändert wurde.
            if (featData.characterSheet === 3) {
                title += `<span class="auto-marker" title="${autoText}">⚙</span>`;
            }

            let descKey = featData.featD_sheet; 
            if (!descKey || descKey === 0) descKey = featData.featDLabel;

            let rawText = t[descKey] || "";
            
            // TAGS Parsen
            const parsedText = parseFeatDescription(rawText, data);

            htmlContent += `
                <div class="feature-block">
                    <div class="feature-header">
                        <span class="feature-title">${title}</span>
                    </div>
                    <div class="feature-text">${parsedText}</div>
                </div>
            `;
        }
    });

    // 4. Expertise Liste anhängen (falls nötig)
    if (appendExpertiseList) {
        const t = translations[currentLanguage];
        
        // WICHTIG: 'let' verwenden, damit wir das Zahnrad anhängen können
        let title = t["expertiseLabel"] || "Expertise";
        
        // --- NEU: ZAHNRAD HINZUFÜGEN ---
        title += `<span class="auto-marker" title="${autoText}">⚙</span>`;
        // -------------------------------

        const rawText = t["expertiseD"] || "[CHOICE_LIST]classForm.expertise[/CHOICE_LIST]"; 
        
        const parsedText = parseFeatDescription(rawText, data);

        htmlContent += `
            <div class="feature-block">
                <div class="feature-header">
                    <span class="feature-title">${title}</span>
                </div>
                <div class="feature-text">${parsedText}</div>
            </div>
        `;
    }

    featsContainer.innerHTML = htmlContent;
}

/* --------------------------------------------------------------------------
   HELPER FUNKTIONEN FÜR TALENTE (FEATS)
   -------------------------------------------------------------------------- */

// 1. Haupt-Parser für Talent-Beschreibungen
function parseFeatDescription(text, data) {
    if (!text) return "";

    // A. Einfache Auswahl: [CHOICE]...[/CHOICE]
    text = text.replace(/\[CHOICE\](.*?)\[\/CHOICE\]/g, (m, path) => {
        return getFeatSingleChoiceName(path.trim(), data);
    });

    // B. Listen (Typ A und Typ B): [CHOICE_LIST]...[/CHOICE_LIST]
    text = text.replace(/\[CHOICE_LIST\](.*?)\[\/CHOICE_LIST\]/g, (m, path) => {
        return getFeatChoiceListHTML(path.trim(), data);
    });

    // C. Waffenmeisterschaften: [MASTERY_LIST]...[/MASTERY_LIST]
    text = text.replace(/\[MASTERY_LIST\](.*?)\[\/MASTERY_LIST\]/g, (m, path) => {
        return getFeatMasteryListHTML(path.trim(), data);
    });

    return text;
}

// 2. Helper: Einzelne Auswahl auflösen ([CHOICE])
function getFeatSingleChoiceName(keyPath, data) {
    let val = getFeatValueByPath(data, keyPath);
    
    if (val === undefined || val === null || val === "") return "-";

    // Falls Array: Rekursiv für jedes Element aufrufen und mit Komma verbinden
    if (Array.isArray(val)) {
        return val.map(v => resolveSingleValue(keyPath, v)).join(", ");
    }

    // Einzelwert
    return resolveSingleValue(keyPath, val);
}

// Innere Funktion für die eigentliche Übersetzung eines einzelnen Wertes
function resolveSingleValue(keyPath, val) {
    // A. Ist es Text? (z.B. "strengthLabel") -> Direkt übersetzen
    if (isNaN(val)) {
        return (translations[currentLanguage] && translations[currentLanguage][val]) 
               ? translations[currentLanguage][val] 
               : val;
    }

    // B. Liste identifizieren
    const fieldName = keyPath.split('.').pop(); // Letztes Element (z.B. "attributes")
    const listName = FIELD_TO_LIST_MAP[fieldName];

    if (!listName) return val;

    // C. Liste abrufen
    // Wir nutzen bevorzugt getListByName. Nur wenn das fehlschlägt (null), 
    // prüfen wir direkt auf attributeList, da diese eine 'const' Variable ist.
    let list = (typeof getListByName === 'function') ? getListByName(listName) : null;

    if (!list && listName === 'attributeList' && typeof attributeList !== 'undefined') {
        list = attributeList;
    }

    // D. Item suchen & Label zurückgeben
    if (list && Array.isArray(list)) {
        // Findet item.ID (4) oder item.id (4) egal ob Zahl oder String
        const foundItem = list.find(item => (item.ID == val || item.id == val));
        
        if (foundItem) {
            const labelKey = foundItem.translationLabel || foundItem.label;
            
            // Wenn Übersetzung da ist -> Fettgedruckt zurückgeben
            if (labelKey && translations[currentLanguage] && translations[currentLanguage][labelKey]) {
                return `<b>${translations[currentLanguage][labelKey]}</b>`; 
            }
            return labelKey || val; 
        }
    }

    return val;
}

// 3. Helper: Listen auflösen ([CHOICE_LIST]) - Typ A & Typ B
function getFeatChoiceListHTML(path, data) {
    // --- TYP B: SPEZIFISCHE ZAUBER-QUELLE ---
    if (path.includes('source.name')) {
        return getFeatSpellListBySourceHTML(path, data);
    }

    // --- TYP A: STANDARD LISTE ---
    let val = getFeatValueByPath(data, path);
    if (!val || !Array.isArray(val) || val.length === 0) return "<i>Keine.</i>";

    const pathParts = path.split('.');
    const fieldName = pathParts[pathParts.length - 1]; 
    
    let listName = CHOICE_LIST_MAP[fieldName];
    
    // Erweiterungen für Talente
    if (fieldName === 'spellLists') listName = 'classCoreTraitsList'; 
    if (fieldName === 'spellcastingAbilities') listName = 'attributeList';
    if (fieldName === 'energyMasteries') listName = 'energyMasteryCategoryList'; 
    if (fieldName === 'damageType_Boon') listName = 'damageType_All'; 

    let list = null;
    if (listName === 'classCoreTraitsList') list = classCoreTraitsList;
    else if (listName === 'attributeList') list = attributeList;
    else if (listName === 'energyMasteryCategoryList') list = energyMasteryCategoryList;
    else list = getListByName(listName);

    if (!list) return "-";

    let html = "<ul class='compact-list'>";
    val.forEach(savedId => {
        const idInt = parseInt(savedId, 10);
        const item = list.find(obj => obj.id == idInt || Object.values(obj).includes(idInt) || obj.ID === idInt);
        
        if (item) {
            const labelKey = item.translationLabel || item.label;
            const title = (translations[currentLanguage] && translations[currentLanguage][labelKey]) 
                          ? translations[currentLanguage][labelKey] 
                          : labelKey;
            
            // --- ÄNDERUNG: Jetzt mit <b> Tags für Fettdruck ---
            html += `<li><b>${title}</b></li>`;
        }
    });
    return html + "</ul>";
}

// 4. Helper für Typ B: Zauber anhand der Source finden
function getFeatSpellListBySourceHTML(path, data) {
    const parts = path.split('.');
    const arrayName = parts[0]; // z.B. "preparedSpells" oder "cantrips"
    const targetLabel = parts[parts.length - 1]; // z.B. "magicInitiateLabel"

    // 1. Zieldaten-Array dynamisch anhand des Tags auswählen
    let spellArray = [];
    if (arrayName === 'preparedSpells') spellArray = data.spells.prepared || [];
    else if (arrayName === 'cantrips') spellArray = data.spells.cantrips || [];
    else if (arrayName === 'spellbookSpells') spellArray = data.spells.spellbook || [];
    else if (arrayName === 'favoredSpells') spellArray = data.spells.favored || [];
    
    // 2. Filterung WIRKLICH nur auf dem Array anwenden, das vom Tag verlangt wurde!
    const foundSpells = spellArray.filter(entry => {
        return entry.source && entry.source.name === targetLabel;
    });

    // 3. Duplikate herausfiltern, aber das Objekt behalten, um an "spellList" heranzukommen
    const uniqueEntries = [];
    const seenIds = new Set();
    foundSpells.forEach(entry => {
        if (!seenIds.has(entry.spellId)) {
            seenIds.add(entry.spellId);
            uniqueEntries.push(entry);
        }
    });

    if (uniqueEntries.length === 0) return "<i>Keine.</i>";

    let html = "<ul class='compact-list'>";
    uniqueEntries.forEach(entry => {
        if (typeof spellList !== 'undefined') {
            const spell = spellList.find(s => s.ID === entry.spellId);
            if (spell) {
                // Name des Zaubers übersetzen
                const name = (translations[currentLanguage] && translations[currentLanguage][spell.translationLabel]) 
                             ? translations[currentLanguage][spell.translationLabel] 
                             : spell.translationLabel;

                // 4. Klassen-Zuordnung aus den Daten auslesen (z.B. spellList: 'druid')
                let classSuffix = "";
                if (entry.source && entry.source.spellList) {
                    const rawClass = entry.source.spellList; // "druid", "wizard", etc.
                    
                    // Wir versuchen die Übersetzung direkt ("druid") oder mit Fallback ("druidLabel")
                    let translatedClass = (translations[currentLanguage] && translations[currentLanguage][rawClass]) 
                                          ? translations[currentLanguage][rawClass] 
                                          : (translations[currentLanguage] && translations[currentLanguage][rawClass + "Label"])
                                            ? translations[currentLanguage][rawClass + "Label"]
                                            : rawClass;
                    
                    // Fallback: Ersten Buchstaben groß machen
                    if (translatedClass === rawClass) {
                        translatedClass = translatedClass.charAt(0).toUpperCase() + translatedClass.slice(1);
                    }
                    
                    classSuffix = ` (${translatedClass})`;
                }

                // Name nun in fett und danach der Zusatz (z.B. "Kältestrahl (Druide)")
                html += `<li><b>${name}</b>${classSuffix}</li>`;
            }
        }
    });
    return html + "</ul>";
}

// 5. Helper: Waffenmeisterschaften ([MASTERY_LIST])
function getFeatMasteryListHTML(path, data) {
    let val = getFeatValueByPath(data, path); // Array von Waffen-IDs

    if (!val || !Array.isArray(val)) return "<i>Keine.</i>";
    if (typeof weaponList === 'undefined' || typeof weaponMastery === 'undefined') return "-";

    const uniqueMasteryIds = new Set();
    let html = "<ul class='compact-list'>";
    
    val.forEach(wId => {
        const w = weaponList.find(x => x.ID === parseInt(wId));
        
        if (w && w.weaponMasteryCategoryNumber) {
            // Wir listen jede Meisterschafts-ART nur einmal auf (Unique Check)
            // Wenn man Dolch (Vex) und Handarmbrust (Vex) hat, wird "Vex" nur einmal erklärt.
            if (!uniqueMasteryIds.has(w.weaponMasteryCategoryNumber)) {
                uniqueMasteryIds.add(w.weaponMasteryCategoryNumber);
                
                const m = weaponMastery.find(x => x.weaponMasteryCategoryNumber === w.weaponMasteryCategoryNumber);
                if (m) {
                    const mName = (translations[currentLanguage] && translations[currentLanguage][m.translationLabel]) 
                                  ? translations[currentLanguage][m.translationLabel] 
                                  : m.translationLabel;
                    
                    // Beschreibungsschlüssel ermitteln
                    // Prio 1: Explizites Label in den Daten
                    // Prio 2: "vexD" (Label ohne 'Label' + 'D')
                    // Prio 3: "vexLabelD" (Label + 'D')
                    let descKey = m.weaponMasteryDLabel;
                    
                    if (!descKey || !translations[currentLanguage][descKey]) {
                        const shortKey = m.translationLabel.replace('Label', 'D'); // z.B. vexD
                        if (translations[currentLanguage][shortKey]) {
                            descKey = shortKey;
                        } else {
                            descKey = m.translationLabel + 'D'; // z.B. vexLabelD
                        }
                    }

                    const mDesc = (translations[currentLanguage] && translations[currentLanguage][descKey]) 
                                  ? translations[currentLanguage][descKey] 
                                  : "";
                    
                    // Ausgabe: Fett Name: Beschreibung
                    if (mDesc) {
                        html += `<li><b>${mName}:</b> ${mDesc}</li>`;
                    } else {
                        html += `<li><b>${mName}</b></li>`;
                    }
                }
            }
        }
    });
    return html + "</ul>";
}

// 6. Lokaler Pfad-Finder
function getFeatValueByPath(obj, path) {
    if (!path || !obj) return undefined;
    const keys = path.split('.');
    let current = obj;
    for (let i = 0; i < keys.length; i++) {
        if (current === undefined || current === null) return undefined;
        current = current[keys[i]];
    }
    return current;
}


/* --- Talente mit Einfluss auf Werte --- */

function applyTalentFeatureLogic(charData) {
    const levelInput = document.getElementById('level');
    const currentLevel = levelInput ? parseInt(levelInput.value, 10) : 1;

    // --- GLOBALE FLAGS RESETTEN ---
    window.hasMediumArmorMaster = false;
    window.hasArcheryStyle = false;
    window.hasDefenseStyle = false;
    window.speedBonusTalent = 0; 

    // Lokale Stats-Sammlung
    let computedStats = {
        strength: parseInt(document.getElementById('strengthScore').value) || 10,
        dexterity: parseInt(document.getElementById('dexterityScore').value) || 10,
        constitution: parseInt(document.getElementById('constitutionScore').value) || 10,
        intelligence: parseInt(document.getElementById('intelligenceScore').value) || 10,
        wisdom: parseInt(document.getElementById('wisdomScore').value) || 10,
        charisma: parseInt(document.getElementById('charismaScore').value) || 10,
        computedAC: 0,
        expertiseSkillIDs: [],
        additionalProficiencies: { armor: [], weapon: [] }, 
        bonusSpeedFT: 0 
    };

    // =========================================================================
    // ZENTRALE EXPERTISE-VERARBEITUNG (EXPERT_CHECK LOGIK FÜR WERTE)
    // =========================================================================
    // Wir lesen hier zentral alle gespeicherten Expertisen aus 'classForm.expertise'.
    // Das deckt Fall B ab (Klasse kannte Expertise nicht, Talent hat Liste gefüllt).
    // Da wir IDs sammeln und später deduplizieren (Set), ist es sicher, dies immer zu tun.
    // Führt die Berechnung EINMAL für alle Skills aus.
    if (charData.classForm && charData.classForm.expertise && Array.isArray(charData.classForm.expertise)) {
        // Wir wandeln Strings in Zahlen um, um sicherzugehen
        const expertSkills = charData.classForm.expertise.map(id => parseInt(id, 10)).filter(id => !isNaN(id));
        computedStats.expertiseSkillIDs.push(...expertSkills);
        // console.log("Expertise Skills (aus Talent/Klasse) zur Berechnung hinzugefügt:", expertSkills);
    }
    // =========================================================================

    if (typeof talentHandlers !== 'undefined' && typeof featList !== 'undefined') {
        const activeFeatIDs = new Set();

        // 1. IDs SAMMELN 
        if (charData.feats && charData.feats.background) activeFeatIDs.add(parseInt(charData.feats.background, 10));
        if (charData.feats && charData.feats.species) activeFeatIDs.add(parseInt(charData.feats.species, 10));
        
        if (charData.classForm && charData.classForm.feats && Array.isArray(charData.classForm.feats)) {
            charData.classForm.feats.forEach(item => activeFeatIDs.add(parseInt(item.feat, 10)));
        }

        // 2. VERARBEITUNG
        activeFeatIDs.forEach(featID => {
            const featData = featList.find(f => f.ID === featID);
            if (!featData) return;

            // --- SPEZIAL-CHECKS ---
            if (featData.translationLabel === "mediumArmorMasterLabel") window.hasMediumArmorMaster = true;
            if (featData.translationLabel === "archeryLabel") window.hasArcheryStyle = true;
            if (featData.translationLabel === "defenseLabel") window.hasDefenseStyle = true;

            // Autom. Proficiencies
            if (featData.Get_armorCategoryNumber && Array.isArray(featData.Get_armorCategoryNumber)) {
                computedStats.additionalProficiencies.armor.push(...featData.Get_armorCategoryNumber);
            }
            if (featData.Get_weaponCategoryNumber && Array.isArray(featData.Get_weaponCategoryNumber)) {
                computedStats.additionalProficiencies.weapon.push(...featData.Get_weaponCategoryNumber);
            }

            // Handler aufrufen
            const sheetStatus = featData.characterSheet;
            const hasLogic = (sheetStatus === 2 || sheetStatus === 3 || typeof sheetStatus === 'string');

            if (hasLogic && talentHandlers[featData.translationLabel]) {
                const tempCharData = { ...charData };
                tempCharData.basic.level = currentLevel;
                talentHandlers[featData.translationLabel](tempCharData, computedStats);
            }
        });
    }

    // --- 3. FINALE UPDATES ---

    // Basis-AC durch Klassenspezialitäten (z.B. Unarmored Defense)
    if (computedStats.computedAC > 0 && computedStats.computedAC > window.classFeatureAC) {
        window.classFeatureAC = computedStats.computedAC;
        // updateArmorClass() wird unten sowieso aufgerufen
    }

    // Expertise & Skills
    if (computedStats.expertiseSkillIDs.length > 0) {
        window.activeExpertiseIDs = [...new Set([...window.activeExpertiseIDs, ...computedStats.expertiseSkillIDs])];
        updateSkillValues();
    }
    updateSavingThrowValues();

    // Proficiencies
    if (computedStats.additionalProficiencies.armor.length > 0) setProficiencies(computedStats.additionalProficiencies.armor, 'armor');
    if (computedStats.additionalProficiencies.weapon.length > 0) setProficiencies(computedStats.additionalProficiencies.weapon, 'weapon');
    
    // Speed -  Wert global speichern
    window.speedBonusTalent = computedStats.bonusSpeedFT;

    // <--- WICHTIG: FORCIERTE UPDATES AM ENDE --->
    
    // Angriffe (wegen Archery Flag)
    updatePhysicalAttacks(); 
    
    // Rüstungsklasse (wegen Defense Flag & Medium Armor Master Flag)
    updateArmorClass(); 

    calculateFinalSpeed();
}
