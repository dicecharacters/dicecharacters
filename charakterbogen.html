function processAppearance(data) {
    const t = translations[currentLanguage] || {};
    const getTrans = (key) => (t[key] ? t[key] : key);
    
    // Helfer für leere Werte
    const getSafeVal = (val) => (val && val !== "null" && val !== "undefined" && val !== "") ? val : "-";

    const app = data.appearance || {};

    // 1. Volk / Erblinie kombinieren & formatieren
    let rawSpecies = data.basic.species || "";
    if (rawSpecies) {
        // Ersten Buchstaben klein machen (z.B. "Elf" -> "elf")
        rawSpecies = rawSpecies.charAt(0).toLowerCase() + rawSpecies.slice(1);
        // "Label" anhängen, falls es noch nicht da ist (-> "elfLabel")
        if (!rawSpecies.endsWith("Label")) {
            rawSpecies += "Label";
        }
    }
    
    let displaySpeciesKey = rawSpecies;
    // Wenn es eine Erblinie gibt (z.B. "woodElfLabel"), überschreibt diese das normale Volk
    if (data.basic.lineage && data.basic.lineage !== "null" && data.basic.lineage !== "") {
        displaySpeciesKey = data.basic.lineage; 
    }
    setVal("physSpecies", getSafeVal(getTrans(displaySpeciesKey)));
    
    // 2. Abstammung (Ancestry) Logik
    let ancestryDisplay = "-";
    const rawAncestry = data.basic.ancestry;
    if (rawAncestry && rawAncestry !== "null" && rawAncestry !== "undefined" && rawAncestry !== "") {
        if (typeof ancestryList !== 'undefined') {
            // In der Liste nach der Abstammung suchen
            const ancestryObj = ancestryList.find(a => a.ancestryLabel === rawAncestry);
            if (ancestryObj && ancestryObj.physicAncestryLabel) {
                // Das gefundene physische Label übersetzen
                ancestryDisplay = getTrans(ancestryObj.physicAncestryLabel);
            } else {
                ancestryDisplay = getTrans(rawAncestry); // Fallback
            }
        } else {
            ancestryDisplay = getTrans(rawAncestry); // Fallback
        }
    }
    setVal("physAncestry", ancestryDisplay);

    setVal("physGender", getSafeVal(getTrans(app.gender)));

    // 3. Alter mit Einheit
    let ageVal = getSafeVal(app.age);
    if (ageVal !== "-") {
        ageVal = `${ageVal} ${getTrans("yearsLabel")}`;
    }
    setVal("physAge", ageVal);

    setVal("physEyes", getSafeVal(getTrans(app.eyeColor)));
    setVal("physHairs", getSafeVal(getTrans(app.hairColor)));
    setVal("physSkin", getSafeVal(getTrans(app.skinTone)));

    // 4. Größe mit Einheit
    let sizeVal = getSafeVal(app.size);
    if (sizeVal !== "-") {
        const unit = currentLanguage === 'de' ? 'cm' : 'ft.';
        sizeVal = `${sizeVal} ${unit}`;
    }
    setVal("physSize", sizeVal);

    setVal("appearanceDescription", app.description || "");

    updateSizeCategory();
}


/* --------------------------------------------------------------------------
   3 i. Geschichte, Persönlichkeit & Glaube 
   -------------------------------------------------------------------------- */
function processStoryAndAlignment(data) {
    const t = translations[currentLanguage] || {};
    const getTrans = (key) => (t[key] ? t[key] : key);

    // 1. Geschichte & Hintergrund
    let bgKey = data.basic.background || "";
    if (bgKey && bgKey !== "null" && bgKey !== "undefined") {
        // Ersten Buchstaben klein machen ("Guard" -> "guard")
        bgKey = bgKey.charAt(0).toLowerCase() + bgKey.slice(1);
    } else {
        bgKey = "";
    }
    
    const bgName = getTrans(bgKey);
    const subtitleEl = document.getElementById('storySubtitle');
    if (subtitleEl) subtitleEl.textContent = bgName && bgKey ? `- ${bgName} -` : ""; 
    
    setVal("characterStory", data.details.story || "");

    // 2. Sprachen aus Liste übersetzen (Hintergrund/Spezies + Klasse kombiniert)
    let langs = data.proficiencies.languages || [];
    
    // Klassensprachen hinzufügen (falls vorhanden)
    if (data.classForm && data.classForm.languages) {
        const classLangs = Array.isArray(data.classForm.languages) ? data.classForm.languages : [data.classForm.languages];
        langs = langs.concat(classLangs);
    }
    
    // --- NEU: Automatisch gelernte Sprachen durch Klassenmerkmale (z.B. Druidisch) ---
    if (window.additionalClassLanguages && window.additionalClassLanguages.length > 0) {
        langs = langs.concat(window.additionalClassLanguages);
    }

    // Duplikate entfernen (Set filtert automatisch doppelte IDs heraus)
    langs = [...new Set(langs)];

    const translatedLangs = langs.map(id => {
        if (typeof languageList !== 'undefined') {
            const langData = languageList.find(l => l.languageCategoryNumber == id || l.translationLabel == id);
            if (langData) return getTrans(langData.translationLabel);
        }
        return getTrans(id); // Fallback
    }).filter(Boolean); // Leere Einträge rausfiltern
    
    setVal("languagesList", translatedLangs.length > 0 ? translatedLangs.join(', ') : "-");

    // 3. Persönlichkeit & Gesinnung
    setVal("personalityTraits", data.details.personalityTraits || "");

    let alignKey = data.details.alignment;
    let alignText = "-";
    
    if (alignKey && alignKey !== "null" && alignKey !== "undefined" && alignKey !== "") {
        if (typeof alignmentList !== 'undefined') {
            const alignData = alignmentList.find(a => a.translationLabel === alignKey || a.alignmentCategoryNumber == alignKey);
            if (alignData) {
                const fullName = getTrans(alignData.translationLabel);
                const abbr = getTrans(alignData.alignmentAbbrLabel);
                alignText = `${fullName} (${abbr})`; // z.B. Rechtschaffen Gut (RG)
            } else {
                alignText = getTrans(alignKey);
            }
        } else {
            alignText = getTrans(alignKey);
        }
    }
    setVal("alignmentInput", alignText);

    // 4. Glaube / Gottheit
    const deityId = parseInt(data.details.deityId, 10);
    if (!isNaN(deityId) && typeof deityList !== 'undefined') {
        const deity = deityList.find(d => d.ID === deityId);
        if (deity) {
            setVal("faithDeity", getTrans(deity.translationLabel));
            const doms = Array.isArray(deity.domainLabel) ? deity.domainLabel : [deity.domainLabel];
            setVal("faithDomain", doms.map(d => getTrans(d)).join(', '));
            setVal("faithAlign", getTrans(deity.alignmentAbbrLabel));
            setVal("faithSymbol", getTrans(deity.godSymbol));
        } else {
            setVal("faithDeity", data.details.deityName || "-");
            setVal("faithDomain", "-"); setVal("faithAlign", "-"); setVal("faithSymbol", "-");
        }
    } else {
        setVal("faithDeity", data.details.deityName || "-");
        setVal("faithDomain", "-"); setVal("faithAlign", "-"); setVal("faithSymbol", "-");
    }

    // 5. Gemeinschaft
    setVal("communityNameInput", data.details.communityName || "");
    const commDescEl = document.getElementById("communityDesc");
    if (commDescEl) commDescEl.innerHTML = (data.details.communityDesc || "").replace(/\n/g, '<br>');
}

/* --------------------------------------------------------------------------
   3 j. Vilksmerkmale
   -------------------------------------------------------------------------- */

function processSpeciesTraits(data) {
    const container = document.getElementById('speciesTraitsContent');
    if (!container) return;
    container.innerHTML = ""; 
    
    const levelInput = document.getElementById('level');
    const currentLevel = levelInput ? parseInt(levelInput.value, 10) : (parseInt(data.basic.level, 10) || 1);

    let rawSpecies = data.basic.species || "";
    if (rawSpecies) {
        rawSpecies = rawSpecies.charAt(0).toLowerCase() + rawSpecies.slice(1);
        if (!rawSpecies.endsWith("Label")) rawSpecies += "Label";
    }

    if (!rawSpecies || typeof speciesList === 'undefined' || typeof speciesTraitList === 'undefined') return;

    const speciesData = speciesList.find(s => s.translationLabel === rawSpecies);
    if (!speciesData || !speciesData.speciesTraitLabel) return;

    let htmlContent = "";

    speciesData.speciesTraitLabel.forEach(traitLabel => {
        let traitData = speciesTraitList.find(t => t.speciesTraitLabel === traitLabel);
        if (!traitData) return;

        let status = traitData.characterSheet;
        let descKey = traitData.speciesTraitDSheet;
        let titleKey = traitLabel;

        let statusStr = String(status);
        if (statusStr.includes(":LEVEL:")) {
            const parts = statusStr.split(':LEVEL:');
            const targetLevel = parseInt(parts[1], 10);
            status = (currentLevel >= targetLevel) ? parseInt(parts[0], 10) : 0;
        }

        if (statusStr === "0:ANC" && typeof ancestryList !== 'undefined') {
            const ancestryObj = ancestryList.find(a => a.ancestryLabel === data.basic.ancestry);
            if (ancestryObj) {
                status = ancestryObj.characterSheet;
                descKey = ancestryObj.ancestryDLabel;
            } else {
                status = 0;
            }
        }

        if (statusStr === "0:LIN" && typeof lineageList !== 'undefined') {
            const lineageObj = lineageList.find(l => l.lineageLabel === data.basic.lineage && l.level === 1);
            if (lineageObj) {
                status = lineageObj.characterSheet;
                descKey = lineageObj.lineageTraitDSheet;
            } else {
                status = 0;
            }
        }

        // --- ZUSTAND AUSWERTEN: RENDERING ---
        if (status === 1 || status === 3) {
            const t = translations[currentLanguage] || translations['de'];
            
            let title = t[titleKey] || titleKey;
		const autoText = t['autoValueText'] || "Dieser Wert wird automatisch berechnet";
        	if (status === 3) {
            		title += `<span class="auto-marker" title="${autoText}">⚙</span>`;
        	}
            let rawText = t[descKey] || "";
            let parsedText = parseSpeciesTraitDescription(rawText, data);

            if (parsedText) {
                htmlContent += `
                    <div class="feature-block">
                        <div class="feature-header">
                            <span class="feature-title">${title}</span>
                        </div>
                        <div class="feature-text">${parsedText}</div>
                    </div>
                `;
            }
        }
    });

    container.innerHTML = htmlContent;
}

/**
 * Eigener, unabhängiger Parser für Volksmerkmale
 */
function parseSpeciesTraitDescription(text, data) {
    if (!text) return "";

    text = text.replace(/\[CHOICE_LIST\](.*?)\[\/CHOICE_LIST\]/g, (m, path) => {
        if (path.trim() === 'preparedSpells.source.name.speciesSpellsLabel') {
            const targetLabel = "speciesSpellsLabel";
            
            const foundSpells = (data.spells.prepared || []).filter(entry => entry.source && entry.source.name === targetLabel);
            const foundCantrips = (data.spells.cantrips || []).filter(entry => entry.source && entry.source.name === targetLabel);
            
            const allFound = [...foundSpells, ...foundCantrips];
            const uniqueSpellIds = [...new Set(allFound.map(item => item.spellId))];

            if (uniqueSpellIds.length === 0) return "<i>Keine.</i>";

            let listHtml = "<ul class='compact-list'>";
            uniqueSpellIds.forEach(id => {
                if (typeof spellList !== 'undefined') {
                    const spell = spellList.find(s => s.ID === id);
                    if (spell) {
                        const name = (translations[currentLanguage] && translations[currentLanguage][spell.translationLabel]) 
                                     ? translations[currentLanguage][spell.translationLabel] 
                                     : spell.translationLabel;
                        listHtml += `<li><b>${name}</b></li>`;
                    }
                }
            });
            return listHtml + "</ul>";
        }
        return ""; 
    });

    return text;
}

/* Einfluss der Merkmale */

function applySpeciesFeatureLogic(charData) {
    // Globale Spezies-Flags resetten (damit Werte nicht dauerhaft hängen bleiben)
    window.baseSpeedOverride = null;

    // 1. Aktuelles Level auslesen
    const levelInput = document.getElementById('level');
    const currentLevel = levelInput ? parseInt(levelInput.value, 10) : (parseInt(charData.basic.level, 10) || 1);

    // 2. Spezies formatieren (z.B. "Dwarf" -> "dwarfLabel")
    let rawSpecies = charData.basic.species || "";
    if (rawSpecies) {
        rawSpecies = rawSpecies.charAt(0).toLowerCase() + rawSpecies.slice(1);
        if (!rawSpecies.endsWith("Label")) rawSpecies += "Label";
    }

    if (!rawSpecies || typeof speciesList === 'undefined' || typeof speciesTraitList === 'undefined') return;

    // 3. Spezies finden
    const speciesData = speciesList.find(s => s.translationLabel === rawSpecies);
    if (!speciesData || !speciesData.speciesTraitLabel) return;

    // 4. Merkmale iterieren (Nur Logik für Zustand 2 & 3)
    speciesData.speciesTraitLabel.forEach(traitLabel => {
        let traitData = speciesTraitList.find(t => t.speciesTraitLabel === traitLabel);
        if (!traitData) return;

        let status = traitData.characterSheet;
        let handlerKey = traitLabel; // Standard-Schlüssel für Handler

        // --- ERWEITERTE SYNTAX (LEVEL) ---
        let statusStr = String(status);
        if (statusStr.includes(":LEVEL:")) {
            const parts = statusStr.split(':LEVEL:');
            const targetLevel = parseInt(parts[1], 10);
            status = (currentLevel >= targetLevel) ? parseInt(parts[0], 10) : 0;
        }

        // --- ERWEITERTE SYNTAX (ANC) ---
        if (statusStr === "0:ANC" && typeof ancestryList !== 'undefined') {
            const ancestryObj = ancestryList.find(a => a.ancestryLabel === charData.basic.ancestry);
            if (ancestryObj) {
                status = ancestryObj.characterSheet;
                handlerKey = ancestryObj.ancestryLabel; // z.B. "blackLabel"
            } else {
                status = 0; 
            }
        }

        // --- ERWEITERTE SYNTAX (LIN) ---
        if (statusStr === "0:LIN" && typeof lineageList !== 'undefined') {
            const lineageObj = lineageList.find(l => l.lineageLabel === charData.basic.lineage && l.level === 1);
            if (lineageObj) {
                status = lineageObj.characterSheet;
                handlerKey = lineageObj.lineageLabel; // z.B. "woodElfLabel"
            } else {
                status = 0;
            }
        }

        // --- ZUSTAND AUSWERTEN: LOGIK ---
        if ((status === 2 || status === 3) && typeof speciesHandlers !== 'undefined') {
            if (speciesHandlers[handlerKey]) {
                // Sicherstellen, dass das aktuelle Level in den Daten ist
                charData.basic.level = currentLevel; 
                speciesHandlers[handlerKey](charData);
            }
        }
    });

    // --- NEU: Nach der Spezies-Auswertung sofort die Speed neu berechnen ---
    calculateFinalSpeed();
}

// Konfiguration der Zeilen pro Grad (Vorgabe)
const spellRowsConfig = {
    0: 4, // Cantrips
    1: 5,
    2: 5,
    3: 4,
    4: 3,
    5: 2,
    6: 2,
    7: 2,

};

function processSpellsPage(data) {
    console.log("Verarbeite Zauber (Seite 5)...");
    
    // 1. Labels setzen
    const t = translations[currentLanguage];
    setTextContent('page5Title', t['spellsLabel']);
    setTextContent('th_spell_name', t['nameLabel'] || "Name");
    setTextContent('th_spell_ability', t['abilityLabel'] || "Attr.");
    setTextContent('th_spell_dc', t['DCLabel'] || "SG");
    setTextContent('th_spell_attack', t['bonusLabel'] || "Angriff");
    setTextContent('th_spell_benefit', t['spellBenefitsfromLabel'] || "Begünstigt durch");
    setTextContent('th_spell_appendix_page', t['appendixPage2Label'] || "Anhang S.");

    const tableBody = document.getElementById('spellTableBody');
    if (!tableBody) return;
    tableBody.innerHTML = ""; // Reset

    // 2. Daten vorbereiten (Alle Zauber sammeln)
    // Wir mappen prepared UND cantrips in eine Liste mit Zusatzinfos
    let allSpells = [];
    
    // Helper: Zauber hinzufügen
    const addSpellToList = (list, type) => {
        if (!list) return;
        list.forEach(entry => {
            // entry hat: { spellId: 1, source: {...} }
            const spellObj = spellList.find(s => s.ID === entry.spellId);
            if (spellObj) {
                allSpells.push({
                    spell: spellObj,
                    source: entry.source,
                    type: type // 'cantrip' oder 'prepared'
                });
            }
        });
    };

    addSpellToList(data.spells.cantrips, 'cantrip');
    addSpellToList(data.spells.prepared, 'prepared');

    // 3. Durch alle Grade iterieren (0 bis 9)
    for (let level = 0; level <= 9; level++) {
        renderSpellLevelBlock(level, allSpells, data, tableBody);
    }
}

function renderSpellLevelBlock(level, allSpells, data, tableBody) {
    const t = translations[currentLanguage];
    
    // A. Trennzeile erstellen
    const trHeader = document.createElement('tr');
    trHeader.className = "spell-level-header";
    
    const labelKey = level === 0 ? "cantripLabel" : getLevelKey(level);
    const levelName = t[labelKey] || labelKey;

    let headerContent = `<td colspan="6" style="padding-left: 10px;">${levelName}`;

    // Slots hinzufügen (außer bei Cantrips)
    if (level > 0) {
        const slots = calculateSpellSlots(level, data);
        const slotLabel = t['spellSlotsLabel'] || "Zauberplätze";
        
        // HTML für Checkboxen bauen
        let checkboxes = "";
        for(let i=0; i<slots; i++) {
            checkboxes += `<input type="checkbox" class="slot-checkbox">`;
        }
        
        // Nur anzeigen, wenn Slots > 0
        if (slots > 0) {
            headerContent += `<div class="spell-slots-container" style="float:right;">
                                <span>${slotLabel} (${slots}):</span> 
                                ${checkboxes}
                              </div>`;
        } else {
             // Optional: Anzeige "Keine Slots" oder leer lassen
             headerContent += `<div class="spell-slots-container" style="float:right;">
                                <span style="font-weight:normal; font-size:0.8em;">-</span> 
                              </div>`;
        }
    }
    
    headerContent += `</td>`;
    trHeader.innerHTML = headerContent;
    tableBody.appendChild(trHeader);

    // B. Zauber für diesen Grad filtern
    // Hinweis: In spellList ist spellLevel ein String Key (z.B. "cantripLabel", "1stLevelLabel")
    const targetLabelKey = level === 0 ? "cantripLabel" : getLevelKey(level);
    
    const spellsForLevel = allSpells.filter(s => s.spell.spellLevel === targetLabelKey);

    // C. Zeilen rendern (feste Anzahl)
    const rowCount = spellRowsConfig[level] || 0;

    for (let i = 0; i < rowCount; i++) {
        const tr = document.createElement('tr');
        
        // Wenn ein Zauber vorhanden ist, füllen wir ihn ein. Sonst leer.
        if (i < spellsForLevel.length) {
            const entry = spellsForLevel[i];
            fillSpellRow(tr, entry, data, level);
        } else {
            // Leere Zeile
            tr.innerHTML = `
                <td></td>
                <td><input type="text" class="spell-input" readonly></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            `;
        }
        tableBody.appendChild(tr);
    }
}

function fillSpellRow(tr, entry, data, level) {
    const t = translations[currentLanguage];
    const spell = entry.spell;
    const source = entry.source; 

    // 1. Name
    const name = t[spell.translationLabel] || spell.translationLabel;

    // 2. Ability (Attribut) ermitteln
    const abilityKey = determineSpellAbility(source, data);
    const abilityName = (t[abilityKey] && t[abilityKey].substring(0,3)) || "---"; 

    // 3. Stats berechnen (SG & Angriff)
    const stats = calculateSpellStats(abilityKey); 

    // 4. Benefits Check
    let benefitText = "";
    
    // KORREKTUR: Bei Cantrips (Level 0) immer "-"
    if (level === 0) {
        benefitText = "-";
    } else {
        // Nur bei Level 1+ prüfen wir auf Begünstigung
        const isFavored = data.spells.favored && data.spells.favored.some(f => f.spellId === spell.ID);
        
        if (isFavored) {
            const favEntry = data.spells.favored.find(f => f.spellId === spell.ID);
            if (favEntry && favEntry.source && favEntry.source.name) {
                 const srcLabel = favEntry.source.name;
                 benefitText = t[srcLabel] || srcLabel;
            } else {
                 benefitText = "Bonus"; 
            }
        }
    }

   // --- Prüfen, ob das Tetris-Skript dem Zauber eine Seite zugewiesen hat ---
    let appPage = "-";
    if (window.spellAppendixPages && window.spellAppendixPages[spell.ID]) {
        appPage = window.spellAppendixPages[spell.ID];
    }

    // HTML einfügen
    // KORREKTUR: Im ersten TD steht jetzt level (also 0) statt der Abfrage nach "C"
    tr.innerHTML = `
        <td><input type="text" class="spell-input" value="${name}" readonly></td>
        <td class="center-text">${abilityName}</td>
        <td class="center-text">${stats.dc}</td>
        <td class="center-text">${stats.attack}</td>
        <td><input type="text" class="spell-input" value="${benefitText}" readonly></td>
        <td class="center-text">${appPage}</td>
    `;
}

// --- LOGIK III: ZAUBERATTRIBUT ERMITTELN ---
function determineSpellAbility(source, data) {
    if (!source) return "intelligenceLabel"; // Fallback

    // Fall 1: Volk
    if (source.type === 'Volk' || source.type === 'Species') {
        return data.spells.spellcastingAbility_species || "intelligenceLabel";
    }

    // Fall 2: Klasse
    if (source.type === 'Klasse' || source.type === 'Class') {
        // Klasse identifizieren (z.B. aus data.basic.class)
        // ACHTUNG: source.name ist oft z.B. 'classPreparedSpellsLabel', das hilft nicht viel für die Klasse selbst.
        // Aber wir wissen ja, welche Klasse der Char hat.
        // WICHTIG: Ein Char kann nur EINE Klasse haben im Ersteller (kein Multiclassing). 
        // Daher nehmen wir data.basic.class.
        
        const className = data.basic.class; // "Barbarian"
        if (!className) return "intelligenceLabel";

        const classData = getClassDataArray(className); // Holt z.B. barbarianClassData (Array)
        // Wir brauchen aber das Metadaten-Objekt 'classCoreTraitsList' für das Attribut!
        
        const coreTrait = classCoreTraitsList.find(c => c.translationLabel.toLowerCase() === className.toLowerCase());
        
        if (coreTrait) {
            // Hat die Klasse ein festes Attribut? (z.B. Wizard -> intelligenceLabel)
            if (coreTrait.spellcastingAbility && coreTrait.spellcastingAbility !== 0) {
                return coreTrait.spellcastingAbility;
            }
            // Wenn 0, dann Unterklasse prüfen
            if (data.classForm.subclass) {
                const subId = parseInt(data.classForm.subclass, 10);
                // Suche in subclassSpellAbillityList
                // Wir müssen matchen: classLabel (lowercase) und subclassCategoryNumber
                const subEntry = subclassSpellAbillityList.find(s => 
                    s.classLabel.toLowerCase() === className.toLowerCase() &&
                    s.subclassCategoryNumber === subId // ACHTUNG: Die Liste oben hatte subclassLabel, wir müssen das mappen oder subclassCategoryNumber in der Liste ergänzen!
                    // KORREKTUR: In deiner Vorgabe oben hast du 'subclassCategoryNumber' zur Liste subclassSpellAbillityList hinzugefügt. Sehr gut!
                );
                
                if (subEntry) {
                    return subEntry.spellAbillityLabel;
                }
            }
        }
        return "intelligenceLabel"; // Fallback
    }

    // Fall 3: Talent
    if (source.type === 'Talent' || source.type === 'Feat') {
        // A. Spezialfall Magic Initiate
        if (source.name === 'magicInitiateLabel') {
            // spellList ('cleric', 'druid', 'wizard') bestimmt das Attribut
            const list = source.spellList; 
            if (list === 'cleric' || list === 'druid') return "wisdomLabel";
            if (list === 'wizard') return "intelligenceLabel";
            return "intelligenceLabel"; 
        }

        // B. Generell: Mapping aus spellcastingAbility_talent
        // Das Objekt sieht so aus: { 'ritualCasterLabel': 'intelligenceLabel', ... }
        const map = data.spells.spellcastingAbility_talent; 
        if (map && map[source.name]) {
            return map[source.name];
        }
    }

    return "intelligenceLabel"; // Letzter Fallback
}

// --- LOGIK IV & V: SG & ANGRIFF BERECHNEN ---
function calculateSpellStats(abilityLabel) {
    // 1. PB holen
    const pbInput = document.getElementById('proficiencyBonus');
    // Wert ist z.B. "+2". Wir entfernen das "+"
    const pb = pbInput ? parseInt(pbInput.value.replace('+',''), 10) : 2;

    // 2. Modifikator holen
    // abilityLabel ist z.B. "intelligenceLabel" -> ID ist "intelligenceModifier"
    let modId = "";
    if (abilityLabel === "strengthLabel") modId = "strengthModifier";
    else if (abilityLabel === "dexterityLabel") modId = "dexterityModifier";
    else if (abilityLabel === "constitutionLabel") modId = "constitutionModifier";
    else if (abilityLabel === "intelligenceLabel") modId = "intelligenceModifier";
    else if (abilityLabel === "wisdomLabel") modId = "wisdomModifier";
    else if (abilityLabel === "charismaLabel") modId = "charismaModifier";

    const modInput = document.getElementById(modId);
    // Wert ist z.B. "+3" oder "-1"
    const mod = modInput ? parseInt(modInput.value, 10) : 0;

    // 3. Berechnen
    const saveDC = 8 + pb + mod;
    const attackVal = pb + mod;
    const attackStr = attackVal >= 0 ? `+${attackVal}` : `${attackVal}`;

    return { dc: saveDC, attack: attackStr };
}

// --- LOGIK: ZAUBERPLÄTZE ---
function calculateSpellSlots(spellLevel, data) {
    // 1. Basisklasse prüfen
    const className = data.basic.class;
    if (!className) return 0;
    
    const coreTrait = classCoreTraitsList.find(c => c.translationLabel.toLowerCase() === className.toLowerCase());
    if (!coreTrait) return 0;

    const charLevel = parseInt(document.getElementById('level').value, 10) || 1;
    let hasSlots = false;

    // A. Basisklasse kann zaubern?
    if (coreTrait.spellcastingLabel === 1) {
        hasSlots = true;
    } 
    // B. Unterklasse kann zaubern?
    else if (data.classForm.subclass) {
        const subId = parseInt(data.classForm.subclass, 10);
        // Prüfen ob Unterklasse in der Liste der Zauberer ist
        const subEntry = subclassSpellAbillityList.find(s => 
            s.classLabel.toLowerCase() === className.toLowerCase() &&
            s.subclassCategoryNumber === subId
        );
        if (subEntry) hasSlots = true;
    }

    if (!hasSlots) return 0;

    // C. Daten abrufen (SSpSLX)
    // Wir brauchen das Array mit den Progressionsdaten (z.B. bardClassData)
    const classDataArray = getClassDataArray(className);
    if (!classDataArray) return 0;

    // Zeile für aktuelles Level finden
    const levelRow = classDataArray.find(r => r.level === charLevel);
    if (!levelRow) return 0;

    // Spalte auslesen (z.B. "SSpSL1")
    const key = `SSpSL${spellLevel}`;
    return levelRow[key] || 0;
}

// Helper Keys
function getLevelKey(lvl) {
    if (lvl === 1) return "1stLevelLabel";
    if (lvl === 2) return "2ndLevelLabel";
    if (lvl === 3) return "3rdLevelLabel";
    return `${lvl}thLevelLabel`;
}

function processSpellbookPage(data) {
    if (data.basic.class.toLowerCase() !== 'wizard') return;
    
    console.log("Verarbeite Zauberbuch (Seite 6)...");
    const t = translations[currentLanguage];

    // 1. Header & Labels setzen
    setTextContent('page6Title', t['spellbookLabel'] || "Zauberbuch");
    for(let i=1; i<=9; i++) {
        const lvlKey = getLevelKey(i);
        setTextContent(`sb_title_${i}`, t[lvlKey] || lvlKey);
        setTextContent(`th_prep_${i}`, t['preparedLabel'] || "Vorb.");
        setTextContent(`th_name_${i}`, t['nameLabel'] || "Name");
        
        // Tabellen leeren
        const tbody = document.querySelector(`#sb_table_${i} tbody`);
        if(tbody) tbody.innerHTML = "";
    }

    // 2. Zauber iterieren
    const bookSpells = data.spells.spellbook || [];
    const preparedSpells = data.spells.prepared || [];

    bookSpells.forEach(entry => {
        const spellId = parseInt(entry, 10) || (entry.spellId ? parseInt(entry.spellId, 10) : null);
        if(!spellId) return;

        const spellData = spellList.find(s => s.ID === spellId);
        if(!spellData) return;

        // Welcher Grad? (Zahl extrahieren aus "1stLevelLabel")
        const levelMatch = spellData.spellLevel.match(/\d+/);
        if(!levelMatch) return; // Cantrips ausfiltern
        const spellLvl = parseInt(levelMatch[0], 10);
        if(spellLvl < 1 || spellLvl > 9) return;

        // 3. Prüfen ob vorbereitet
        const prepEntry = preparedSpells.find(p => p.spellId === spellId);
        const isPrepared = !!prepEntry;
        
        // WICHTIG: Ist der Zauber zwangs-vorbereitet? (Talent oder Spezies)
        let isLocked = false;
        if (isPrepared && prepEntry.source) {
            const sType = prepEntry.source.type;
            if (sType !== 'Klasse' && sType !== 'Class') {
                isLocked = true; // Z.B. durch Talent gewährt -> Darf nicht weggeklickt werden
            }
        }

        // 4. Rendern
        const tbody = document.querySelector(`#sb_table_${spellLvl} tbody`);
        if(!tbody) return;

        const spellName = t[spellData.translationLabel] || spellData.translationLabel;
        const tr = document.createElement('tr');
        
        const checkedAttr = isPrepared ? "checked" : "";
        const lockedAttr = isLocked ? "data-locked='true'" : "";
        const titleAttr = isLocked ? "title='Durch Talent oder Herkunft gebunden'" : "";

        tr.innerHTML = `
            <td style="text-align: center;">
                <input type="checkbox" class="spellbook-checkbox" data-id="${spellId}" ${checkedAttr} ${lockedAttr} ${titleAttr}>
            </td>
            <td>${spellName}</td>
        `;
        tbody.appendChild(tr);
    });

    // 5. Event Listener für Klicks anbinden
    document.querySelectorAll('.spellbook-checkbox').forEach(cb => {
        cb.addEventListener('change', function() {
            handleSpellbookCheckboxClick(this);
        });
    });
}

function handleSpellbookCheckboxClick(checkbox) {
    const spellId = parseInt(checkbox.getAttribute('data-id'), 10);
    const isChecked = checkbox.checked;

    // 1. Daten frisch aus LS laden, um Überschreiben zu verhindern
    const currentData = loadCharacterDataFromStorage();
    let preparedArray = currentData.spells.prepared || [];

    if (isChecked) {
        // Füge hinzu
        const exists = preparedArray.find(p => p.spellId === spellId);
        if (!exists) {
            preparedArray.push({
                spellId: spellId,
                source: { type: 'Klasse', name: 'classPreparedSpellsLabel' } // Deine gewünschte Quelle!
            });
        }
    } else {
        // Entferne
        preparedArray = preparedArray.filter(p => p.spellId !== spellId);
    }

    // 2. Zurück in LocalStorage speichern! (Wichtig für Konsistenz beim Neuladen)
    localStorage.setItem("preparedSpells", JSON.stringify(preparedArray));

    // 3. charData im RAM aktualisieren und Seite 5 (Zauber) live neu rendern!
    currentData.spells.prepared = preparedArray;
    processSpellsPage(currentData);
}

function buildAppendix() {
    removeAppendix(); // Altlasten löschen
    console.log("Generiere Zauber-Anhang...");

    const charData = loadCharacterDataFromStorage();
    const root = document.getElementById('sheetRoot');
    const t = translations[currentLanguage];

    if (charData.spells.prepared) charData.spells.prepared.forEach(s => spellIds.add(s.spellId));
    if (charData.spells.spellbook) charData.spells.spellbook.forEach(s => spellIds.add(parseInt(s, 10) || s.spellId));

    if (spellIds.size === 0) return;

        const s = spellList.find(x => x.ID === id);

    });

    spellsToRender.sort((a, b) => {
        const getLvl = (lvlStr) => lvlStr === "cantripLabel" ? 0 : parseInt(lvlStr.match(/\d+/)?.[0] || 99);
        return getLvl(a.spellLevel) - getLvl(b.spellLevel);
    });

    // 3. TETRIS ALGORITHMUS SETUP
    let currentAppendixPageNum = 1;
    let currentHtmlPage = null;
    let colLeft = null;
    let colRight = null;
    
    let activeCol = 1; // 1 = Links, 2 = Rechts
    let capacityLeft = 3; // Boxen-Einheiten (1/3) pro Spalte

    const createNewPage = () => {
        appendixTotalPages++;
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page fixed-page appendix-page';
        
        pageDiv.innerHTML = `
            <div class="character-sheet simple-layout">
                <header class="simple-header">
                    <div class="header-left-simple">
                        <input type="text" class="simple-input-name" value="${charData.basic.name}" readonly>
                    </div>
                    <div class="header-right-simple">
                        <h1 class="page-title">${t['spellDecLabel'] || 'Zauber Anhang'}</h1>
                    </div>
                </header>
                <div class="simple-divider-line"></div>
                <main class="sheet-main-content simple-content-override">
                    <div class="appendix-layout">
                        <div class="appendix-col left-col"></div>
                        <div class="appendix-col right-col"></div>
                    </div>
                </main>
		<footer class="sheet-footer">
                    <div class="footer-left">
                    </div>
                    <div class="footer-right">
                        <span>${t['appendixPageLabel'] || 'Anhang Seite'}</span>
                        <span>${currentAppendixPageNum} / <span class="app-total-pages"></span></span>
                    </div>
                </footer>
            </div>
        `;
        root.appendChild(pageDiv);
        currentHtmlPage = pageDiv;
        colLeft = pageDiv.querySelector('.left-col');
        colRight = pageDiv.querySelector('.right-col');
        activeCol = 1;
        capacityLeft = 3;
        currentAppendixPageNum++;
    };

    // Erste Seite erstellen
    createNewPage();

    // 4. ZAUBER RENDERN & VERTEILEN
    spellsToRender.forEach(spell => {
        // --- A. Daten aufbereiten ---
        const name = t[spell.translationLabel] || spell.translationLabel;
        const level = t[spell.spellLevel] || spell.spellLevel;
        const school = t[spell.spellSchool] || spell.spellSchool;
        
        let classes = "-";
        if (Array.isArray(spell.classLabel)) {
            classes = spell.classLabel.map(c => t[c] || c).join(", ");
        } else if (spell.classLabel) {
            classes = t[spell.classLabel] || spell.classLabel;
        }

        const time = t[spell.castingTime] ? `${spell.castingTimeValue} ${t[spell.castingTime]}` : spell.castingTime;
        
        // Reichweite (Umrechnung ft zu m)
        let range = spell.spellRange;
        if (typeof range === 'number' || !isNaN(range)) {
            if (currentLanguage === 'de') {
                range = (parseInt(range, 10) / 5 * 1.5) + " m";
            } else {
                range = range + " ft.";
            }
        } else {
            range = t[range] || range;
        }

        const duration = spell.durationTimeValue === 0 ? (t[spell.duration] || spell.duration) : `${spell.durationTimeValue} ${t[spell.duration] || spell.duration}`;
        
        // --- B. Material extrahieren ---
        let rawDesc = t[spell.spellDLabel] || "";
        let materialText = "";
        
        // Regex sucht nach "Material: ..." bis zum HTML-Zeilenumbruch oder Ende
        const matRegex = /(?:<b[^>]*>)?Material:(?:<\/b>)?\s*(.*?)(?:<br\s*\/?>|<\/p>|<ul>|$)/i;
        const match = rawDesc.match(matRegex);
        if (match) {
            materialText = match[1].trim();
            rawDesc = rawDesc.replace(matRegex, ""); // Entfernt den Material-Satz aus der Beschreibung!
        }

        // Komponenten
        let comps = Array.isArray(spell.components) ? spell.components.map(c => t[c] || c.replace('comp','').replace('Label','')).join(", ") : spell.components;
        if (materialText && comps.includes("M")) {
            comps = comps.replace("M", `M (${materialText})`);
        }

        // Summon Tooltip einfügen
        const hoverText = t['lookManuelCreatureText'] || "";
        rawDesc = rawDesc.replace(/<span class="spell-summon-link">(.*?)<\/span>/g, `<span class="spell-summon-link" title="${hoverText}">$1</span>`);

        // --- C. Größen-Kalkulation (1, 2 oder 3 Einheiten) ---
        const charCount = rawDesc.length;
        let boxSize = 1; // 1/3 Höhe
        let textClass = "";

        if (charCount < 400) {
            boxSize = 1; textClass = "";
        } else if (charCount >= 400 && charCount < 700) {
            boxSize = 1; textClass = "text-small";
        } else if (charCount >= 700 && charCount < 1200) {
            boxSize = 2; textClass = "text-small";
        } else if (charCount >= 1200 && charCount < 1800) {
            boxSize = 2; textClass = "text-tiny";
        } else {
            boxSize = 3; textClass = "text-tiny"; // Ganze Spalte!
        }

        // --- D. Tetris: Passt die Box noch in die aktuelle Spalte? ---
        if (boxSize > capacityLeft) {
            // Spaltenwechsel
            activeCol++;
            capacityLeft = 3;
            if (activeCol > 2) {
                // Seitenwechsel
                createNewPage();
            }
        }

        // --- E. HTML Block bauen ---
        const boxDiv = document.createElement('div');
        boxDiv.className = `spell-desc-box box-h${boxSize} ${textClass}`;
        
        boxDiv.innerHTML = `
            <div class="sd-header">
                <span class="sd-title">${name}</span>
                <span class="sd-subtitle">${level}, ${school}</span>
            </div>
            <div class="sd-meta">
                <div class="sd-meta-item"><b>${t['castingTimeLabel'] || 'Zeit'}:</b> ${time}</div>
                <div class="sd-meta-item"><b>${t['rangeLabel'] || 'Reichweite'}:</b> ${range}</div>
                <div class="sd-meta-item"><b>${t['componentLabel'] || 'Komp.'}:</b> ${comps}</div>
                <div class="sd-meta-item"><b>${t['durationLabel'] || 'Dauer'}:</b> ${duration}</div>
            </div>
            <div class="sd-text">${rawDesc}</div>
        `;

        // In die richtige Spalte pushen
        if (activeCol === 1) colLeft.appendChild(boxDiv);
        else colRight.appendChild(boxDiv);

        capacityLeft -= boxSize;

	// --- Merke dir die aktuelle Anhang-Seite für diesen Zauber ---
	window.spellAppendixPages[spell.ID] = appendixTotalPages;
    }); // Ende der spellsToRender.forEach Schleife

    // 5. Appendix Gesamtzahlen updaten
    document.querySelectorAll('.app-total-pages').forEach(el => {
        el.textContent = appendixTotalPages;
    });

    processSpellsPage(charData);
}

/**
 * Hauptfunktion zum Umschalten des Modus
 */
function toggleEditMode() {
    isEditMode = !isEditMode;
    
    const btn = document.getElementById("editModeBtn");
    
    // Labels holen: Wir greifen auf die GLOBALE Variable currentLanguage zu!
    const t = translations[currentLanguage] || {};
    
    // Fallback-Kette: Erst unsere neuen Labels, dann Default-Text
    const labelEdit = t.editButtonLabel || t.editLabel || "Bearbeiten";
    const labelFinish = t.finishLabel || "Fertig";
    
    if (btn) {
        // Text ändern je nach Modus
        btn.textContent = isEditMode ? labelFinish : labelEdit;
        
        // Klasse toggeln für Farbwechsel (z. B. Blau <-> Rot)
        if (isEditMode) {
            btn.classList.add("active");
        } else {
            btn.classList.remove("active");
        }
    }

    // Sperren aktualisieren (Felder klickbar machen oder sperren)
    applyFieldLocks();
}

/**
 * Wendet die Sperren (readonly/disabled) basierend auf dem Modus an
 */
function applyFieldLocks() {

    // --- NEU: BILD-BOXEN STEUERN ---
    const imgContainers = [
        document.getElementById('portraitContainer'),
        document.getElementById('communitySymbolBox')
    ];
    imgContainers.forEach(container => {
        if (!container) return;
        if (isEditMode) {
            container.style.cursor = 'pointer';
            container.classList.add('editable-image-box');
        } else {
            container.style.cursor = 'default';
            container.classList.remove('editable-image-box');
        }
    });

    // Selektor
    const allInputs = document.querySelectorAll("input, textarea, select, [contenteditable]");

    allInputs.forEach(input => {
        const id = input.id;

        // --- SONDERFALL: Content-Editable Divs auf Seite 3 ---
        // Wir prüfen nur, ob das Attribut existiert, egal welchen Wert es gerade hat
        if (input.hasAttribute('contenteditable')) {
            
            // Im Edit-Mode: "true" (String), sonst "false" (String)
            input.contentEditable = isEditMode ? "true" : "false";
            
            // Optisches Feedback
            // Wenn editierbar: leicht grau. Wenn fertig: transparent.
            input.style.backgroundColor = isEditMode ? "rgba(0, 0, 0, 0.05)" : "transparent";
            
            // Cursor anpassen
            input.style.cursor = isEditMode ? "text" : "default";
            
            return; // Hier abbrechen, damit die Standard-Logik unten nicht greift
        }

        // --- SONDERFALL: Spiegel-Felder (Namen auf Seite 2+) ---
        if (input.classList.contains('sync-char-name')) {
            lockInput(input, true); 
            return;
        }
        
        // --- SONDERFALL: Dynamisch erstellte Skills & Saves ---
        if (input.classList.contains("skill-value") || (id && id.endsWith("SavingValue"))) {
            lockInput(input, true); 
            return;
        }
        
        if (id && id.endsWith("Trained")) {
            lockInput(input, !isEditMode);
            return;
        }

        // --- SONDERFALL: Todesrettungswürfe ---
        if (input.closest('.death-saves-box')) {
             lockInput(input, false); 
             return;
        }

        // --- SONDERFALL: Equipped Checkboxen ---
        if (input.classList.contains('equipped-checkbox')) {
            lockInput(input, false);
            return;
        }

        // --- Zauberplatz Checkboxen ---
        if (input.classList.contains('slot-checkbox')) {
            lockInput(input, false); // false = NICHT sperren (also bearbeitbar)
            return;
        }

	// --- Anhang Toggle ---
        if (id === 'generateSpellDesc') {
            lockInput(input, false);
            return;
        }

        // --- Zauberbuch Checkboxen ---
        if (input.classList.contains('spellbook-checkbox')) {
            // Wenn das Attribut "data-locked" existiert -> hart sperren!
            if (input.getAttribute('data-locked') === "true") {
                lockInput(input, true);
            } else {
                // Ansonsten an den Edit-Mode koppeln
                lockInput(input, !isEditMode); 
            }
            return;
        }

        // --- REGULÄRE PRÜFUNG NACH LISTEN ---
        if (alwaysEditableFields.includes(id)) {
            lockInput(input, false);
        } 
        else if (neverEditableFields.includes(id)) {
            lockInput(input, true);
        } 
        else if (editModeOnlyFields.includes(id)) {
            lockInput(input, !isEditMode);
        } 
        else {
            // FALLBACK
            lockInput(input, !isEditMode);
        }
    });
}

/**
 * Hilfsfunktion: Setzt Readonly oder Disabled je nach Input-Typ
 */
function lockInput(element, shouldLock) {
    if (element.type === "checkbox" || element.type === "radio" || element.tagName === "SELECT") {
        element.disabled = shouldLock;
    } else {
        // Text, Number, Textarea
        element.readOnly = shouldLock;
        
        // Visuelles Feedback
        if (shouldLock) {
            element.style.backgroundColor = "transparent"; 
            // Optional: element.style.borderBottom = "none"; 
        } else {
            element.style.backgroundColor = "rgba(0, 0, 0, 0.05)"; // Ganz leichtes Grau beim Bearbeiten
        }
    }
}

async function downloadPDF() {
  const isDefaultZoom = Math.abs(1 - window.devicePixelRatio) < 0.02;
  if (!isDefaultZoom) {
    alert("Bitte setzen Sie den Browser-Zoom auf 100% (Strg+0).");
    return;
  }

  const root = document.getElementById('sheetRoot');
  if (!root) {
    alert('sheetRoot nicht gefunden.');
    return;
  }

  // ==========================================================
  // DYNAMISCHER DATEINAME
  // ==========================================================
  
  // 1. Namen aus dem Feld holen (oder Fallback "Unbekannt")
  const nameInput = document.getElementById('characterName');
  let charName = nameInput && nameInput.value ? nameInput.value.trim() : "Unbekannt";

  // 2. Sonderzeichen durch "_" ersetzen
  // Filtert: \ / : * ? " < > | , ;
  let safeName = charName.replace(/[\\/:\*\?"<>|;,]/g, '_');
  
  // Doppelte Unterstriche (z.B. "Peter__der") zu einem zusammenfassen
  safeName = safeName.replace(/_+/g, '_');

  // Leerzeichen direkt vor oder nach einem Unterstrich entfernen (für saubere Optik)
  safeName = safeName.replace(/_ /g, '_').replace(/ _/g, '_');

  // 3. Datum im Format DDMMMYYYY generieren
  const d = new Date();
  const day = String(d.getDate()).padStart(2, '0'); // z.B. "05"
  const monthArr = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
  const month = monthArr[d.getMonth()]; // z.B. "MAR"
  const year = d.getFullYear(); // z.B. "2026"
  const dateString = `${day}${month}${year}`;

  // 4. Dateinamen zusammensetzen
  const finalFilename = `${safeName}_Character-Sheet_${dateString}.pdf`;
  
  // ==========================================================

  document.body.classList.add('pdf-export-mode');

  const options = {
    filename: finalFilename,
    margin: 0,
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  try {
    // 1) Rendern
    const worker = html2pdf().from(root).set(options).toPdf();

    // 2) PDF-Instanz holen und überschüssige Seiten löschen
    await worker.get('pdf').then(pdf => {
      // Seitenzahl ermitteln (kompatibel je nach jsPDF-Version)
      const getTotal = () => {
        if (typeof pdf.getNumberOfPages === 'function') return pdf.getNumberOfPages();
        if (pdf.internal && pdf.internal.getNumberOfPages) return pdf.internal.getNumberOfPages();
        return null;
      };

      const total = getTotal();
      
      // Wir nutzen jetzt die globale Variable 'totalPages' (aktuell 6)
      const finalAllowedPages = totalPages + appendixTotalPages;

      if (!total || total <= finalAllowedPages) return;

      // Seiten hinter der letzten gewollten Seite entfernen
      if (typeof pdf.deletePage === 'function') {
        for (let p = total; p > finalAllowedPages; p--) {
          pdf.deletePage(p);
        }
      } else {
        console.warn('pdf.deletePage nicht verfügbar – kann überzählige Seiten nicht entfernen.');
      }
    });

    // 3) Speichern
    await worker.save();
  } catch (e) {
    console.error(e);
    alert('PDF-Export ist fehlgeschlagen. Siehe Konsole für Details.');
  } finally {
    document.body.classList.remove('pdf-export-mode');
  }
}

/* --- BILDER-UPLOAD LOGIK (Mit Canvas Auto-Resize) --- */

function setupImageUploads() {
    const portraitContainer = document.getElementById('portraitContainer');
    const portraitInput = document.getElementById('portraitInput');
    
    const symbolContainer = document.getElementById('communitySymbolBox');

    if (portraitContainer && portraitInput) {

        });

        portraitInput.addEventListener('change', (e) => processAndSaveImage(e, portraitContainer, 'portraitImage', 800));
    }

    if (symbolContainer && symbolInput) {
        symbolContainer.addEventListener('click', () => {
            if (isEditMode) symbolInput.click();
        });
        symbolInput.addEventListener('change', (e) => processAndSaveImage(e, symbolContainer, 'symbolImage', 400));
    }

// Lädt das Bild, verkleinert es, speichert es und zeigt es an
function processAndSaveImage(event, container, storageKey, maxSize) {
    const file = event.target.files[0];
    if (!file) return;

    // Nur Bilder zulassen
    if (!file.type.startsWith('image/')) {
        alert("Bitte nur Bilder (JPG, PNG, WEBP) hochladen.");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            // A. Canvas erstellen für Skalierung
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            // B. Proportionen beibehalten und verkleinern
            if (width > height) {
                if (width > maxSize) {
                    height = Math.round(height * (maxSize / width));
                    width = maxSize;
                }
            } else {
                if (height > maxSize) {
                    width = Math.round(width * (maxSize / height));
                    height = maxSize;
                }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // C. In Base64 JPG komprimieren (80% Qualität ist super klein & scharf)
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

            // D. Bild anzeigen
            applyImageToContainer(container, dataUrl);

            // E. Speichern (Local Storage)
            try {
                localStorage.setItem(storageKey, dataUrl);
            } catch (err) {
                console.warn("LocalStorage voll:", err);
                alert("Speicherlimit erreicht. Bitte ein noch kleineres Bild versuchen.");
            }
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// Setzt das Bild als CSS Background
function applyImageToContainer(container, dataUrl) {
    if (!container || !dataUrl) return;
    container.style.backgroundImage = `url(${dataUrl})`;
    container.classList.add('has-image');
}

// Lädt die Bilder beim Start aus dem Speicher

    const portraitData = localStorage.getItem('portraitImage');
    if (portraitData) applyImageToContainer(document.getElementById('portraitContainer'), portraitData);

    const symbolData = localStorage.getItem('symbolImage');
    if (symbolData) applyImageToContainer(document.getElementById('communitySymbolBox'), symbolData);
}
